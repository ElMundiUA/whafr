{{- if not .Values.existingEnvSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lighthouse.envSecretName" . }}
  labels: {{- include "lighthouse.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.env.secretsKey }}
  LIGHTHOUSE_SECRETS_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.env.adminToken }}
  LIGHTHOUSE_ADMIN_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.env.openaiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.env.anthropicKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.env.openrouterKey }}
  OPENROUTER_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.env.githubToken }}
  GITHUB_TOKEN: {{ . | quote }}
  {{- end }}
{{- end }}
