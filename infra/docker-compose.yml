services:
  neo4j:
    image: neo4j:5.26-community
    container_name: lighthouse-neo4j
    ports:
      - "7474:7474"  # HTTP / Browser
      - "7687:7687"  # Bolt
    environment:
      # ``neo4j/neo4j`` is the default; we set our own to skip the
      # first-login password change Neo4j prompts otherwise.
      NEO4J_AUTH: neo4j/neo4j_dev_password
      # Enable APOC + vector indexes — Graphiti uses both during ingest
      # and hybrid search.
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      # Tuned for a single-node dev box. Raise -Xmx if the working set
      # gets big.
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_dev_password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Docling: PDF / DOCX / PPTX / image-of-document extraction.
  # Trafilatura handles HTML; this fills the gap for paginated formats
  # where layout-aware parsing materially beats naive text extraction.
  # WebConnector routes URLs that look like PDFs to this service.
  docling:
    image: quay.io/docling-project/docling-serve:latest
    container_name: lighthouse-docling
    ports:
      - "5001:5001"
    # Models are downloaded on first conversion request — keep them
    # persisted across container restarts so re-ingest passes don't
    # re-pull gigabytes of weights.
    volumes:
      - docling-cache:/root/.cache/docling
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: lighthouse-api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_dev_password
      NEO4J_DATABASE: neo4j
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LIGHTHOUSE_PROPOSAL_API_KEY: ${LIGHTHOUSE_PROPOSAL_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
    command: ["uvicorn", "lighthouse.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  neo4j-data:
  neo4j-logs:
  neo4j-plugins:
  docling-cache:
