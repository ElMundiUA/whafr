---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lighthouse
  namespace: lighthouse
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [lighthouse.harborgang.com]
      secretName: lighthouse-tls
  rules:
    - host: lighthouse.harborgang.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lighthouse-api
                port:
                  number: 80
