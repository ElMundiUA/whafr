---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lighthouse-api
  namespace: lighthouse
  labels:
    app.kubernetes.io/name: lighthouse-api
    app.kubernetes.io/part-of: lighthouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lighthouse-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lighthouse-api
    spec:
      containers:
        - name: api
          image: dekus/lighthouse:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: NEO4J_URI
              value: bolt://neo4j.lighthouse.svc.cluster.local:7687
            - name: NEO4J_DATABASE
              value: neo4j
            - name: LIGHTHOUSE_DOCLING_URL
              value: ""                        # docling disabled in cloud for now
            - name: RELEVANCE_GATE_ENABLED
              value: "false"                    # gate is for ingest, not retrieval
          envFrom:
            - secretRef:
                name: lighthouse-env
            - secretRef:
                # Carries NEO4J_USER + NEO4J_PASSWORD (matching the
                # neo4j-auth Secret's NEO4J_AUTH split).
                name: neo4j-client-auth
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: lighthouse-api
  namespace: lighthouse
spec:
  selector:
    app.kubernetes.io/name: lighthouse-api
  ports:
    - name: http
      port: 80
      targetPort: http
