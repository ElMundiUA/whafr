# Weekly coverage-audit CronJob.
#
# Runs ``lighthouse coverage-audit`` against the canonical-queries
# YAML and writes the JSON + markdown summary to a PVC mount so the
# API can serve it as a historical time-series (gap-rate vs week).
# Until the PVC exists, results land under /var/audits inside the
# pod and tail in the container logs — `kubectl logs` is the fallback
# operator view.
#
# Apply:
#   kubectl --context do-fra1-ship-prod -n lighthouse create configmap \
#     coverage-eval-queries --from-file=queries.yaml=data/coverage-eval/queries.yaml \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl --context do-fra1-ship-prod apply -f infra/k8s/coverage-audit-cronjob.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lighthouse-coverage-audit
  namespace: lighthouse
  labels:
    app.kubernetes.io/part-of: lighthouse
    app.kubernetes.io/component: eval
spec:
  schedule: "0 6 * * 0"  # Sundays 06:00 UTC — far from ingest windows
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 8   # keep ~2 months of weekly results
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 1209600  # 14d retention
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: audit
              image: ghcr.io/elmundiua/lighthouse:latest
              imagePullPolicy: Always
              command: ["sh", "-c"]
              # Write to /var/audits inside the pod; tail the markdown
              # to stdout so `kubectl logs` shows the headline numbers.
              args:
                - |
                  set -eu
                  mkdir -p /var/audits
                  RUN_ID=$(date -u +%Y%m%d-%H%M)
                  JSON=/var/audits/audit-$RUN_ID.json
                  MD=/var/audits/audit-$RUN_ID.md
                  lighthouse coverage-audit \
                    --queries /etc/lighthouse-eval/queries.yaml \
                    --top-k 5 \
                    --out "$JSON" \
                    --summary "$MD"
                  echo
                  echo "=== summary ==="
                  cat "$MD"
              env:
                - name: NEO4J_URI
                  value: bolt://neo4j.lighthouse.svc.cluster.local:7687
                - name: NEO4J_DATABASE
                  value: neo4j
                - name: LIGHTHOUSE_DOCLING_URL
                  value: ""
              envFrom:
                - secretRef:
                    name: lighthouse-env
                - secretRef:
                    name: neo4j-client-auth
              volumeMounts:
                - name: queries
                  mountPath: /etc/lighthouse-eval
              resources:
                requests: { cpu: 50m, memory: 256Mi }
                limits:   { cpu: 500m, memory: 1Gi }
          volumes:
            - name: queries
              configMap:
                name: coverage-eval-queries
                items:
                  - key: queries.yaml
                    path: queries.yaml
