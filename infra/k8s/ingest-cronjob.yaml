# Recurring ingest CronJob template.
#
# One CronJob per source-yaml. The CronJob fires a Job that runs the
# lighthouse runner with that yaml; the Job exits when the pass is
# done. ConcurrencyPolicy: Forbid — never run two passes of the same
# yaml in parallel, even if a previous run is still draining.
#
# Apply pattern (template-and-substitute style — no Helm dep):
#
#   for y in phase10-rfcs phase11-post-cutoff; do
#     sed -e "s|__NAME__|$y|g" -e "s|__SCHEDULE__|0 4 * * *|g" \
#       infra/k8s/ingest-cronjob.yaml \
#       | kubectl -n lighthouse apply -f -
#   done
#
# CronJob schedule cheatsheet (standard cron, K8s default UTC):
#   daily 04:00 UTC      → "0 4 * * *"
#   weekly Mon 04:00 UTC → "0 4 * * 1"
#   every 6h             → "0 */6 * * *"
#
# The ConfigMap key naming convention is __NAME__.yaml — match the
# ConfigMap created by ``kubectl create configmap __NAME__
# --from-file=__NAME__.yaml=path``.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lighthouse-ingest-__NAME__
  namespace: lighthouse
  labels:
    app.kubernetes.io/part-of: lighthouse
    app.kubernetes.io/component: ingest
    lighthouse.source: __NAME__
spec:
  schedule: "__SCHEDULE__"
  # Run in UTC so schedules are unambiguous across cluster moves.
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: lighthouse
            app.kubernetes.io/component: ingest
            lighthouse.source: __NAME__
        spec:
          restartPolicy: Never
          containers:
            - name: ingest
              image: dekus/lighthouse:latest
              imagePullPolicy: Always
              command: ["lighthouse"]
              args:
                - "runner"
                - "--once"
                - "--config"
                - "/etc/lighthouse/source.yaml"
                - "--max-concurrent"
                - "3"
                - "--backend"
                - "flat"
              env:
                - name: NEO4J_URI
                  value: bolt://neo4j.lighthouse.svc.cluster.local:7687
                - name: NEO4J_DATABASE
                  value: neo4j
                - name: RELEVANCE_GATE_ENABLED
                  value: "false"
                - name: LIGHTHOUSE_DOCLING_URL
                  value: ""
              envFrom:
                - secretRef:
                    name: lighthouse-env
                - secretRef:
                    name: neo4j-client-auth
              volumeMounts:
                - name: yaml
                  mountPath: /etc/lighthouse
              resources:
                requests: { cpu: 100m, memory: 512Mi }
                limits:   { cpu: 1500m, memory: 2Gi }
          volumes:
            - name: yaml
              configMap:
                name: __NAME__
                items:
                  - key: __NAME__.yaml
                    path: source.yaml
