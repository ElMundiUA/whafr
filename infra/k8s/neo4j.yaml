---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data
  namespace: lighthouse
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage-retain
  resources:
    requests:
      storage: 20Gi
---
# NB: the ``neo4j-auth`` and ``neo4j-client-auth`` Secrets are managed
# out-of-band — kubectl create / SealedSecrets / external-secrets-operator
# of your choice. Apply them BEFORE applying this manifest.
#
#   PWD=$(openssl rand -base64 24 | tr -d "/+=" | head -c 32)
#   kubectl -n lighthouse create secret generic neo4j-auth \
#     --from-literal=NEO4J_AUTH="neo4j/$PWD" --dry-run=client -o yaml |
#       kubectl apply -f -
#   kubectl -n lighthouse create secret generic neo4j-client-auth \
#     --from-literal=NEO4J_USER=neo4j \
#     --from-literal=NEO4J_PASSWORD="$PWD" --dry-run=client -o yaml |
#       kubectl apply -f -
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: lighthouse
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/part-of: lighthouse
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-auth
                  key: NEO4J_AUTH
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_security_procedures_unrestricted
              value: "apoc.*,gds.*"
            - name: NEO4J_server_memory_heap_initial__size
              value: "1G"
            - name: NEO4J_server_memory_heap_max__size
              value: "2G"
            - name: NEO4J_server_memory_pagecache_size
              value: "1G"
            # k8s auto-injects ``NEO4J_PORT_7687_TCP_PORT`` and friends
            # from the matching Service. Neo4j's strict config validation
            # rejects any ``NEO4J_*`` env it doesn't recognise — disable
            # it explicitly. Service env injection cannot be turned off
            # at the pod level when the Service name matches.
            - name: NEO4J_server_config_strict__validation_enabled
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket: { port: bolt }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: bolt }
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests: { cpu: 500m, memory: 1.5Gi }
            limits:   { cpu: 2000m, memory: 4Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo4j-data
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: lighthouse
spec:
  selector:
    app.kubernetes.io/name: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: bolt
    - name: http
      port: 7474
      targetPort: http
---
# Daily backup → DigitalOcean Spaces (s3-compatible).
#
# Neo4j 5 CE doesn't ship online ``neo4j-admin backup`` (Enterprise
# only), and tar'ring ``/data`` is blocked by RWO-PVC multi-attach.
# So we use APOC's stream-export over Bolt: every node + edge is
# materialised as a Cypher restore script, gzipped, shipped. To
# restore: ``cypher-shell -f <dumpname>``.
#
# Requires a Secret ``spaces-credentials`` carrying
# ``key`` / ``secret`` / ``bucket`` / ``endpoint`` (e.g.
# ``fra1.digitaloceanspaces.com``) and the existing
# ``neo4j-client-auth`` for the bolt auth.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: neo4j-backup
  namespace: lighthouse
  labels:
    app.kubernetes.io/part-of: lighthouse
spec:
  # 04:00 UTC daily — low-traffic window for us.
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: neo4j:5.26-community
              env:
                - name: NEO4J_USER
                  valueFrom:
                    secretKeyRef:
                      name: neo4j-client-auth
                      key: NEO4J_USER
                - name: NEO4J_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: neo4j-client-auth
                      key: NEO4J_PASSWORD
                - name: SPACES_KEY
                  valueFrom:
                    secretKeyRef:
                      name: spaces-credentials
                      key: key
                - name: SPACES_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: spaces-credentials
                      key: secret
                - name: SPACES_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: spaces-credentials
                      key: bucket
                - name: SPACES_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: spaces-credentials
                      key: endpoint
              command: ["/bin/bash", "-eu", "-o", "pipefail", "-c"]
              args:
                - |
                  STAMP=$(date -u +%Y%m%d-%H%M%S)
                  DUMP=/tmp/neo4j-${STAMP}.cypher.gz

                  echo "→ apoc.export.cypher.all → $DUMP"
                  cypher-shell -a bolt://neo4j:7687 \
                    -u "$NEO4J_USER" -p "$NEO4J_PASSWORD" \
                    --format plain \
                    "CALL apoc.export.cypher.all(null, \
                       {stream:true, format:'plain', \
                        useOptimizations:{type:'UNWIND_BATCH', unwindBatchSize:50}}) \
                     YIELD cypherStatements RETURN cypherStatements" \
                    | gzip -c > "$DUMP"

                  SIZE=$(stat -c '%s' "$DUMP")
                  echo "→ dump size: $SIZE bytes"
                  [ "$SIZE" -gt 1024 ] || { echo "✗ dump suspiciously small"; exit 1; }

                  echo "→ installing rclone..."
                  apt-get update -qq && apt-get install -y -qq rclone

                  echo "→ uploading to s3://$SPACES_BUCKET/lighthouse/neo4j/"
                  rclone --config /tmp/rclone.conf config create do s3 \
                    provider=DigitalOcean \
                    access_key_id="$SPACES_KEY" \
                    secret_access_key="$SPACES_SECRET" \
                    endpoint="$SPACES_ENDPOINT" \
                    acl=private >/dev/null

                  rclone --config /tmp/rclone.conf copy "$DUMP" \
                    "do:$SPACES_BUCKET/lighthouse/neo4j/"

                  echo "→ pruning backups older than 30 days"
                  rclone --config /tmp/rclone.conf delete \
                    --min-age 30d \
                    "do:$SPACES_BUCKET/lighthouse/neo4j/"

                  echo "✓ backup ok: s3://$SPACES_BUCKET/lighthouse/neo4j/$(basename $DUMP)"
