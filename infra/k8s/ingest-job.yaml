# Ad-hoc ingest Job. Mounts a runner yaml from a ConfigMap, talks to
# the in-cluster Neo4j over Bolt, uses ``lighthouse-env`` for LLM keys
# and ``neo4j-client-auth`` for graph auth.
#
# Spawn with::
#
#     kubectl -n lighthouse create configmap recovery-yaml \
#       --from-file=phase1-recovery.yaml=path/to/yaml \
#       --dry-run=client -o yaml | kubectl apply -f -
#     kubectl -n lighthouse delete job/lighthouse-ingest 2>/dev/null
#     kubectl -n lighthouse apply -f infra/k8s/ingest-job.yaml
#
# Each Job runs to completion; on failure it retries up to
# ``backoffLimit`` times. Pin a different ConfigMap (or replace the
# data inside ``recovery-yaml``) between runs.
apiVersion: batch/v1
kind: Job
metadata:
  name: lighthouse-ingest
  namespace: lighthouse
  labels:
    app.kubernetes.io/part-of: lighthouse
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: dekus/lighthouse:latest
          imagePullPolicy: Always
          command: ["lighthouse"]
          args:
            - "runner"
            - "--once"
            - "--config"
            - "/etc/lighthouse/recovery-yaml.yaml"
            - "--max-concurrent"
            - "3"
          env:
            - name: NEO4J_URI
              value: bolt://neo4j.lighthouse.svc.cluster.local:7687
            - name: NEO4J_DATABASE
              value: neo4j
            - name: RELEVANCE_GATE_ENABLED
              value: "false"
            - name: LIGHTHOUSE_DOCLING_URL
              value: ""
          envFrom:
            - secretRef:
                name: lighthouse-env
            - secretRef:
                name: neo4j-client-auth
          volumeMounts:
            - name: yaml
              mountPath: /etc/lighthouse
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits:   { cpu: 1500m, memory: 2Gi }
      volumes:
        - name: yaml
          configMap:
            name: recovery-yaml
            items:
              - key: phase1-recovery.yaml
                path: recovery-yaml.yaml
