# Async chunk-enrichment worker.
#
# Polls Postgres for chunks with NULL keywords, batches them through
# OpenRouter Qwen-2.5-7B-Instruct for SUMMARY + TAGS + KEYWORDS, and
# writes the result back. The boosted tsvector (tsv_boosted) refreshes
# automatically via the GENERATED column, so search-side benefits the
# moment the UPDATE commits.
#
# Why separate from main ingest:
# - main ingest writes 1 embedding per doc; sub-second per doc.
# - enrichment adds ~700ms of OpenRouter latency per chunk on top.
#   Bundling them would 2-3× ingest wall-time AND couple it to
#   OpenRouter availability.
# - decoupled: ingest stays fast, enrichment catches up at its own
#   pace; a paused worker doesn't block the firehose.
#
# Schedule: every 5 min. concurrencyPolicy Forbid prevents two
# workers fighting over the same rows. Each fire processes one
# batch loop until either the queue is empty or
# --max-runtime-sec elapses.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lighthouse-summary-worker
  namespace: lighthouse
  labels:
    app.kubernetes.io/part-of: lighthouse
    app.kubernetes.io/component: enrichment
spec:
  schedule: "*/5 * * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: lighthouse
            app.kubernetes.io/component: enrichment
        spec:
          restartPolicy: Never
          containers:
            - name: worker
              image: dekus/lighthouse:latest
              imagePullPolicy: Always
              command:
                - python
                - -m
                - lighthouse.runner.summary_worker
                - --batch-size
                - "200"
                - --concurrency
                - "15"
                - --max-runtime-sec
                - "240"  # finish before the next CronJob fires
              envFrom:
                - secretRef:
                    name: lighthouse-env
              resources:
                requests: { cpu: 50m, memory: 256Mi }
                limits:   { cpu: 400m, memory: 768Mi }
