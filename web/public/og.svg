<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, 'Plus Jakarta Sans', 'DM Sans', sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#cfa96b" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#cfa96b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="95%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#5bb8ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5bb8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0b1020"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Kicker -->
  <text x="600" y="180" font-size="22" letter-spacing="6" font-weight="700"
        fill="#cfa96b" text-anchor="middle" opacity="0.85">
    GROUNDING LAYER FOR CODING AGENTS
  </text>

  <!-- Wordmark -->
  <text x="600" y="320" font-size="120" font-weight="800"
        letter-spacing="-3" text-anchor="middle">
    <tspan fill="#e8f4ff">Light</tspan><tspan fill="#cfa96b">house.</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="395" font-size="34" font-weight="500"
        fill="#e8f4ff" opacity="0.7" text-anchor="middle">
    Stop your agent inventing RFC numbers.
  </text>

  <!-- Stats strip -->
  <text x="600" y="540" font-size="22" letter-spacing="3" font-weight="600"
        fill="#e8f4ff" opacity="0.65" text-anchor="middle">
    71K CHUNKS  ·  14K SOURCES  ·  21 RECIPES  ·  APACHE-2.0
  </text>
  <text x="600" y="585" font-size="18" letter-spacing="2" font-weight="500"
        fill="#cfa96b" opacity="0.7" text-anchor="middle">
    lighthouse.harborgang.com
  </text>
</svg>
