name: Build container image

# Build + push the Lighthouse image on every push to main. Publishes
# to Docker Hub (dekus/lighthouse) which is the registry the cluster
# manifests pull from. GHCR mirror kept as a backup since the
# workflow has the GITHUB_TOKEN for free.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "infra/Dockerfile"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Push to both registries. Docker Hub is the canonical
          # target that the cluster pulls; GHCR is a backup.
          images: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/lighthouse
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
