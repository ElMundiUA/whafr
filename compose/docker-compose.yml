# Local Lighthouse stack. One-line bring-up:
#
#   cp .env.example .env       # fill in OPENAI_API_KEY at minimum
#   docker compose up -d       # API + Postgres only
#   docker compose --profile web up -d   # + Astro admin UI on :3000
#
# Healthchecks gate `api` on Postgres so the schema-bootstrap and
# `004_webhooks.sql` migration only fire after pg is ready.

services:
  # ─────────────────────── Postgres + pgvector ───────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: lighthouse-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: lighthouse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lighthouse_dev}
      POSTGRES_DB: lighthouse
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema migrations run on first start. Re-running is idempotent.
      - ../web/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lighthouse -d lighthouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ────────────────────────────── API ────────────────────────────────
  api:
    image: ghcr.io/elmundiua/lighthouse:${LIGHTHOUSE_IMAGE_TAG:-latest}
    container_name: lighthouse-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LIGHTHOUSE_PG_URL: postgresql://lighthouse:${POSTGRES_PASSWORD:-lighthouse_dev}@postgres:5432/lighthouse
      LIGHTHOUSE_SECRETS_KEY: ${LIGHTHOUSE_SECRETS_KEY}
      LIGHTHOUSE_ADMIN_TOKEN: ${LIGHTHOUSE_ADMIN_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LIGHTHOUSE_BACKEND: flat
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────── Optional Astro admin UI (profile=web) ─────────────
  # `docker compose --profile web up` to bring it up.
  # Reads from the same Postgres as the API for /admin/* pages.
  web:
    image: ghcr.io/elmundiua/lighthouse-web:${LIGHTHOUSE_WEB_TAG:-latest}
    container_name: lighthouse-web
    restart: unless-stopped
    profiles: ["web"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      PUBLIC_LIGHTHOUSE_API_BASE: http://api:8000
      LIGHTHOUSE_DATABASE_URL: postgresql://lighthouse:${POSTGRES_PASSWORD:-lighthouse_dev}@postgres:5432/lighthouse
      LIGHTHOUSE_ADMIN_TOKEN: ${LIGHTHOUSE_ADMIN_TOKEN}
    ports:
      - "3000:3000"

volumes:
  pgdata:
    driver: local
