# Canonical-query coverage probes — one set per SDLC domain.
#
# These are the same probe-shape as the manual audit waves but
# committed in repo so the weekly CronJob can re-run them without
# hand-curation. Treat each as "if Lighthouse can't surface useful
# canonical content for this query, that domain has a gap".
#
# Keep queries terse (3-8 words) — same shape models use. Add new
# probes here as topics arise; the audit will re-include them on the
# next run.

clarification:
  - acceptance criteria template gherkin
  - INVEST story principles
  - definition of ready checklist
  - clarifying questions BA backlog
  - given when then format

decomposition:
  - work breakdown structure technique
  - epic to story decomposition
  - MECE feature breakdown
  - INVEST sliced stories vertical
  - dependency mapping engineering tasks

