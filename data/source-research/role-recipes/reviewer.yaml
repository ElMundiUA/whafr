# Role recipe: reviewer (code review / style guides / static analysis)
role: reviewer
audit_domains: [reviewer]
queries_sample:
  - "conventional comments review"
  - "OWASP top 10 auth review"
  - "code review checklist Python"
  - "secrets in PR pre-commit"

tier1_mainstream:
  - id: rv-google-eng-practices
    connector: github_tree
    args: { slug: google/eng-practices, branch: master, file_extensions: [.md], max_files: 50 }
    parity: critical
  - id: rv-conventional-comments
    connector: sitemap
    args: { root: https://conventionalcomments.org, max_pages: 30 }
    parity: critical
  - id: rv-airbnb-js
    connector: github_tree
    args: { slug: airbnb/javascript, branch: master, file_extensions: [.md], max_files: 50 }
    parity: high
  - id: rv-google-styleguide
    connector: github_tree
    args: { slug: google/styleguide, branch: gh-pages, file_extensions: [.md, .html], max_files: 100 }
    parity: high
  - id: rv-rust-api-guidelines
    connector: github_tree
    args: { slug: rust-lang/api-guidelines, branch: master, file_extensions: [.md], max_files: 50 }
    parity: high
  - id: rv-microsoft-api-guidelines
    connector: github_tree
    args: { slug: microsoft/api-guidelines, branch: vNext, file_extensions: [.md], max_files: 30 }
    parity: high
  - id: rv-zalando-api
    connector: github_tree
    args: { slug: zalando/restful-api-guidelines, branch: main, file_extensions: [.md, .adoc], max_files: 100 }
    parity: medium
  - id: rv-pre-commit-hooks
    connector: github_tree
    args: { slug: pre-commit/pre-commit, branch: main, file_extensions: [.md], max_files: 30 }
    parity: medium

tier2_canonical:
  - id: rv-cwe-top25
    connector: web
    args: { urls: ["https://cwe.mitre.org/top25/archive/2024/2024_cwe_top25.html"] }
  - id: rv-owasp-code-review
    connector: github_tree
    args: { slug: OWASP/CheatSheetSeries, branch: master, file_extensions: [.md], include_paths: [cheatsheets/Code_Review_Cheat_Sheet.md, cheatsheets/Secure_Product_Design_Cheat_Sheet.md, cheatsheets/Threat_Modeling_Cheat_Sheet.md], max_files: 10 }

tier3_methodology:
  - id: rv-fowler-refactoring
    connector: sitemap
    args: { root: https://martinfowler.com, max_pages: 200, include_paths: [/refactoringPosts/, /articles/] }
  - id: rv-google-testing-blog
    connector: sitemap
    args: { root: https://testing.googleblog.com, max_pages: 200 }

tier4_streams: []
