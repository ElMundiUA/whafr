# Role recipe: network (protocols, auth, transport)
role: network
audit_domains: [network]
queries_sample:
  - "OAuth 2.0 PKCE code_challenge S256"
  - "JWT header alg kid"
  - "TLS 1.3 0-RTT replay"
  - "HTTP/2 server push deprecated"
  - "QUIC stream multiplexing"
  - "DNS-over-HTTPS RFC 8484"

tier1_mainstream:
  - id: net-cloudflare-blog
    connector: sitemap
    args: { root: https://blog.cloudflare.com, max_pages: 400 }
    parity: critical
  - id: net-grpc-docs
    connector: github_tree
    args: { slug: grpc/grpc.io, branch: main, file_extensions: [.md], include_paths: [content/], max_files: 200 }
    parity: high

tier2_canonical:
  - id: net-rfc-tls
    connector: web
    args:
      urls:
        - https://datatracker.ietf.org/doc/html/rfc8446
        - https://datatracker.ietf.org/doc/html/rfc8447
        - https://datatracker.ietf.org/doc/html/rfc7301
        - https://datatracker.ietf.org/doc/html/rfc6066
        - https://datatracker.ietf.org/doc/html/rfc8879
  - id: net-rfc-quic
    connector: web
    args:
      urls:
        - https://datatracker.ietf.org/doc/html/rfc9000
        - https://datatracker.ietf.org/doc/html/rfc9001
        - https://datatracker.ietf.org/doc/html/rfc9002
        - https://datatracker.ietf.org/doc/html/rfc9221
  - id: net-rfc-http3
    connector: web
    args:
      urls:
        - https://datatracker.ietf.org/doc/html/rfc9114
        - https://datatracker.ietf.org/doc/html/rfc9204
        - https://datatracker.ietf.org/doc/html/rfc9110
        - https://datatracker.ietf.org/doc/html/rfc9111
        - https://datatracker.ietf.org/doc/html/rfc9112
  - id: net-rfc-websocket
    connector: web
    args:
      urls:
        - https://datatracker.ietf.org/doc/html/rfc6455
        - https://datatracker.ietf.org/doc/html/rfc8441
  - id: net-rfc-dns-modern
    connector: web
    args:
      urls:
        - https://datatracker.ietf.org/doc/html/rfc8484   # DoH
        - https://datatracker.ietf.org/doc/html/rfc7858   # DoT
        - https://datatracker.ietf.org/doc/html/rfc9460   # SVCB/HTTPS RR
        - https://datatracker.ietf.org/doc/html/rfc9230   # Oblivious DoH
  - id: net-rfc-mail-auth
    connector: web
    args:
      urls:
        - https://datatracker.ietf.org/doc/html/rfc7208
        - https://datatracker.ietf.org/doc/html/rfc6376
        - https://datatracker.ietf.org/doc/html/rfc7489
        - https://datatracker.ietf.org/doc/html/rfc8617

tier3_methodology:
  - id: net-cloudflare-blog-deep
    connector: sitemap
    args: { root: https://blog.cloudflare.com, max_pages: 200 }
  - id: net-daniel-stenberg
    connector: sitemap
    args: { root: https://daniel.haxx.se, max_pages: 200, include_paths: [/blog/] }
  - id: net-httpwg-blog
    connector: sitemap
    args: { root: https://httpwg.org, max_pages: 100 }

tier4_streams:
  - id: net-cloudflare-rss
    connector: rss
    args: { feeds: ["https://blog.cloudflare.com/rss/"], max_entries: 100, fetch_body_when_missing: true }
