# Role recipe: self-heal (incident response, debugging, observability)

role: self-heal
audit_domains: [self-heal]
queries_sample:
  - "production 5xx spike diagnosis"
  - "memory leak in worker"
  - "slow Postgres query"
  - "DB connection pool exhaustion"
  - "OOM-killed pod postmortem"
  - "blameless postmortem template"
  - "OpenTelemetry trace context propagation"

tier1_mainstream:
  - id: sh-honeycomb-docs
    connector: sitemap
    args: { root: https://docs.honeycomb.io, max_pages: 400 }
    parity: critical
  - id: sh-datadog-docs
    connector: sitemap
    args: { root: https://docs.datadoghq.com, max_pages: 400, include_paths: [/observability_pipelines/, /tracing/, /logs/, /metrics/, /apm/] }
    parity: critical
  - id: sh-sentry-docs
    connector: sitemap
    args: { root: https://docs.sentry.io, max_pages: 300 }
    parity: critical
  - id: sh-grafana-docs
    connector: sitemap
    args: { root: https://grafana.com, max_pages: 400, include_paths: [/docs/grafana/, /docs/loki/, /docs/tempo/, /docs/mimir/] }
    parity: critical
  - id: sh-prometheus-docs
    connector: sitemap
    args: { root: https://prometheus.io, max_pages: 200, include_paths: [/docs/] }
    parity: critical
  - id: sh-opentelemetry-docs
    connector: sitemap
    args: { root: https://opentelemetry.io, max_pages: 400, include_paths: [/docs/] }
    parity: critical
  - id: sh-jaeger-docs
    connector: github_tree
    args: { slug: jaegertracing/documentation, branch: main, file_extensions: [.md], max_files: 100 }
    parity: high
  - id: sh-pyspy
    connector: github_tree
    args: { slug: benfred/py-spy, branch: master, file_extensions: [.md], max_files: 20 }
    parity: high
  - id: sh-memray
    connector: github_tree
    args: { slug: bloomberg/memray, branch: main, file_extensions: [.rst, .md], include_paths: [docs/], max_files: 80 }
    parity: high

tier2_canonical:
  - id: sh-rfc-syslog
    connector: web
    args:
      urls:
        - https://datatracker.ietf.org/doc/html/rfc5424   # Syslog
        - https://datatracker.ietf.org/doc/html/rfc3164   # BSD syslog
        - https://datatracker.ietf.org/doc/html/rfc6587   # TCP syslog
  - id: sh-otel-spec
    connector: github_tree
    args: { slug: open-telemetry/opentelemetry-specification, branch: main, file_extensions: [.md], include_paths: [specification/], max_files: 200 }
  - id: sh-google-sre-book
    connector: sitemap
    args: { root: https://sre.google, max_pages: 300, include_paths: [/books/, /sre-book/, /workbook/] }
  - id: sh-google-sre-workbook
    connector: sitemap
    args: { root: https://sre.google, max_pages: 200, include_paths: [/workbook/] }

tier3_methodology:
  - id: sh-brendan-gregg
    connector: sitemap
    args: { root: https://www.brendangregg.com, max_pages: 250 }
  - id: sh-charity-wtf
    connector: sitemap
    args: { root: https://charity.wtf, max_pages: 150 }
  - id: sh-honeycomb-blog
    connector: sitemap
    args: { root: https://www.honeycomb.io, max_pages: 400, include_paths: [/blog/] }
  - id: sh-pagerduty-postmortems
    connector: sitemap
    args: { root: https://postmortems.pagerduty.com, max_pages: 100 }
  - id: sh-pagerduty-response
    connector: sitemap
    args: { root: https://response.pagerduty.com, max_pages: 100 }
  - id: sh-increment-magazine
    connector: sitemap
    args: { root: https://increment.com, max_pages: 200, include_paths: [/reliability/, /oncall/, /testing/] }
  - id: sh-acm-queue
    connector: sitemap
    args: { root: https://queue.acm.org, max_pages: 200 }

tier4_streams:
  - id: sh-honeycomb-rss
    connector: rss
    args: { feeds: ["https://www.honeycomb.io/blog/feed"], max_entries: 50, fetch_body_when_missing: true }
  - id: sh-grafana-rss
    connector: rss
    args: { feeds: ["https://grafana.com/blog/index.xml"], max_entries: 50, fetch_body_when_missing: true }
  - id: sh-otel-releases
    connector: github_releases
    args: { slug: open-telemetry/opentelemetry-collector, max_releases: 30 }
  - id: sh-prometheus-releases
    connector: github_releases
    args: { slug: prometheus/prometheus, max_releases: 30 }
  - id: sh-grafana-releases
    connector: github_releases
    args: { slug: grafana/grafana, max_releases: 30 }
  - id: sh-sentry-releases
    connector: github_releases
    args: { slug: getsentry/sentry, max_releases: 30 }
