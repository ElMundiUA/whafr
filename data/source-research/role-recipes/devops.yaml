# Role recipe: devops / platform / CI-CD

role: devops
audit_domains: [devops]
queries_sample:
  - "Kubernetes readiness probe"
  - "GitHub Actions OIDC AWS"
  - "Argo Rollouts canary strategy"
  - "HPA autoscaling cpu memory"
  - "external-secrets operator vault"
  - "Helm umbrella chart pattern"

tier1_mainstream:
  - id: do-k8s-website
    connector: github_tree
    args: { slug: kubernetes/website, branch: main, file_extensions: [.md], include_paths: [content/en/docs/concepts/, content/en/docs/tasks/, content/en/docs/reference/, content/en/docs/setup/], max_files: 2500 }
    parity: critical
  - id: do-helm-docs
    connector: sitemap
    args: { root: https://helm.sh, max_pages: 200, include_paths: [/docs/] }
    parity: critical
  - id: do-argo-cd
    connector: github_tree
    args: { slug: argoproj/argo-cd, branch: master, file_extensions: [.md], include_paths: [docs/], max_files: 300 }
    parity: critical
  - id: do-argo-rollouts
    connector: github_tree
    args: { slug: argoproj/argo-rollouts, branch: master, file_extensions: [.md], include_paths: [docs/], max_files: 200 }
    parity: critical
  - id: do-terraform-docs
    connector: sitemap
    args: { root: https://developer.hashicorp.com, max_pages: 600, include_paths: [/terraform/docs/, /terraform/cli/, /terraform/language/] }
    parity: critical
  - id: do-pulumi-docs
    connector: sitemap
    args: { root: https://www.pulumi.com, max_pages: 400, include_paths: [/docs/] }
    parity: high
  - id: do-cert-manager
    connector: sitemap
    args: { root: https://cert-manager.io, max_pages: 200, include_paths: [/docs/] }
    parity: high
  - id: do-istio-docs
    connector: sitemap
    args: { root: https://istio.io, max_pages: 400, include_paths: [/latest/docs/] }
    parity: high
  - id: do-linkerd-docs
    connector: sitemap
    args: { root: https://linkerd.io, max_pages: 300, include_paths: [/2.16/, /2.17/] }
    parity: medium
  - id: do-docker-docs
    connector: sitemap
    args: { root: https://docs.docker.com, max_pages: 400 }
    parity: critical
  - id: do-gh-actions-docs
    connector: sitemap
    args: { root: https://docs.github.com, max_pages: 400, include_paths: [/en/actions/] }
    parity: critical
  - id: do-gitlab-ci-docs
    connector: sitemap
    args: { root: https://docs.gitlab.com, max_pages: 400, include_paths: [/ee/ci/] }
    parity: high
  - id: do-tekton-docs
    connector: github_tree
    args: { slug: tektoncd/website, branch: main, file_extensions: [.md], max_files: 200 }
    parity: medium

tier2_canonical:
  - id: do-cncf-tag-runtime
    connector: github_tree
    args: { slug: cncf/tag-runtime, branch: main, file_extensions: [.md], max_files: 100 }
  - id: do-kubernetes-enhancement-proposals
    connector: github_tree
    args: { slug: kubernetes/enhancements, branch: master, file_extensions: [.md], include_paths: [keps/sig-], max_files: 500 }
  - id: do-conventional-commits
    connector: web
    args: { urls: ["https://www.conventionalcommits.org/en/v1.0.0/"] }
  - id: do-12factor
    connector: sitemap
    args: { root: https://12factor.net, max_pages: 30 }

tier3_methodology:
  - id: do-honeycomb-blog
    connector: sitemap
    args: { root: https://www.honeycomb.io, max_pages: 300, include_paths: [/blog/] }
  - id: do-cncf-blog
    connector: sitemap
    args: { root: https://www.cncf.io, max_pages: 300, include_paths: [/blog/] }
  - id: do-container-solutions
    connector: sitemap
    args: { root: https://www.container-solutions.com, max_pages: 200, include_paths: [/blog] }
  - id: do-hashicorp-blog
    connector: sitemap
    args: { root: https://www.hashicorp.com, max_pages: 200, include_paths: [/blog] }
  - id: do-thenewstack-eng
    connector: sitemap
    args: { root: https://thenewstack.io, max_pages: 300, include_paths: [/kubernetes/, /devops/] }

tier4_streams:
  - id: do-k8s-blog-rss
    connector: rss
    args: { feeds: ["https://kubernetes.io/feed.xml"], max_entries: 50, fetch_body_when_missing: true }
  - id: do-cncf-rss
    connector: rss
    args: { feeds: ["https://www.cncf.io/feed/"], max_entries: 50, fetch_body_when_missing: true }
  - id: do-k8s-releases
    connector: github_releases
    args: { slug: kubernetes/kubernetes, max_releases: 30 }
  - id: do-helm-releases
    connector: github_releases
    args: { slug: helm/helm, max_releases: 30 }
  - id: do-argo-rollouts-releases
    connector: github_releases
    args: { slug: argoproj/argo-rollouts, max_releases: 30 }
  - id: do-argo-cd-releases
    connector: github_releases
    args: { slug: argoproj/argo-cd, max_releases: 30 }
  - id: do-terraform-releases
    connector: github_releases
    args: { slug: hashicorp/terraform, max_releases: 30 }
