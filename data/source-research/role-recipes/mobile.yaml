role: mobile
audit_domains:
- mobile
queries_sample:
- React Native Hermes engine
- EAS Build credentials
- Compose UI state hoisting
- SwiftUI App Intents
- Kotlin Flow vs StateFlow
- iOS background task scheduler
tier1_mainstream:
- id: mob-react-native-docs
  connector: github_tree
  args:
    slug: facebook/react-native-website
    branch: main
    file_extensions:
    - .md
    include_paths:
    - docs/
    max_files: 300
  parity: critical
- id: mob-expo-docs
  connector: github_tree
  args:
    slug: expo/expo
    branch: main
    file_extensions:
    - .md
    - .mdx
    include_paths:
    - docs/pages/
    max_files: 400
  parity: critical
- id: mob-android-compose-samples
  connector: github_tree
  args:
    slug: android/compose-samples
    branch: main
    file_extensions:
    - .md
    max_files: 200
  parity: high
- id: mob-android-architecture
  connector: github_tree
  args:
    slug: android/architecture-samples
    branch: main
    file_extensions:
    - .md
    max_files: 200
  parity: high
- id: mob-android-developers-website
  connector: github_tree
  args:
    slug: android/codelab-android-architecture
    branch: main
    file_extensions:
    - .md
    max_files: 100
  parity: medium
- id: mob-swiftui-tutorials
  connector: github_tree
  args:
    slug: apple/sample-apps-swiftui
    branch: main
    file_extensions:
    - .md
    max_files: 100
  parity: high
- id: mob-kotlin-docs
  connector: github_tree
  args:
    slug: JetBrains/kotlin-web-site
    branch: master
    file_extensions:
    - .md
    include_paths:
    - docs/topics/
    max_files: 400
  parity: critical
- id: mob-flutter-docs
  connector: github_tree
  args:
    slug: flutter/website
    branch: main
    file_extensions:
    - .md
    include_paths:
    - src/content/
    max_files: 400
  parity: high
- name: mob-tamagui-docs
  connector: github_tree
  args:
    slug: tamagui/tamagui
    branch: main
    include_paths:
    - apps/x/data/
    file_extensions:
    - .mdx
    - .md
    max_files: 100
  schedule:
    every: 30d
- name: mob-jetpack-compose-samples
  connector: github_tree
  args:
    slug: android/compose-samples
    branch: main
    file_extensions:
    - .md
    max_files: 80
  schedule:
    every: 30d
tier2_canonical:
- id: mob-wcag-mobile
  connector: web
  args:
    urls:
    - https://www.w3.org/TR/mobile-accessibility-mapping/
tier3_methodology:
- id: mob-vasil-compose
  connector: sitemap
  args:
    root: https://vasildimov.com
    max_pages: 50
- id: mob-swift-by-sundell
  connector: sitemap
  args:
    root: https://www.swiftbysundell.com
    max_pages: 200
- id: mob-objc-io
  connector: sitemap
  args:
    root: https://www.objc.io
    max_pages: 200
- id: mob-android-developers-blog
  connector: sitemap
  args:
    root: https://android-developers.googleblog.com
    max_pages: 200
- id: mob-jetbrains-kotlin-blog
  connector: sitemap
  args:
    root: https://blog.jetbrains.com
    max_pages: 200
    include_paths:
    - /kotlin/
tier4_streams:
- id: mob-react-native-releases
  connector: github_releases
  args:
    slug: facebook/react-native
    max_releases: 30
- id: mob-expo-releases
  connector: github_releases
  args:
    slug: expo/expo
    max_releases: 30
- id: mob-flutter-releases
  connector: github_releases
  args:
    slug: flutter/flutter
    max_releases: 30
- id: mob-kotlin-releases
  connector: github_releases
  args:
    slug: JetBrains/kotlin
    max_releases: 30
