# Role recipe: web3 (Ethereum, smart contracts, DeFi, indexer)
role: web3
audit_domains: [web3]
queries_sample:
  - "Solidity reentrancy guard"
  - "EIP-712 typed data"
  - "Gnosis Safe multisig threshold"
  - "Foundry forge test cheatcodes"
  - "Hardhat plugin development"
  - "Uniswap V3 concentrated liquidity"

tier1_mainstream:
  - id: w3-ethereum-org
    connector: sitemap
    args: { root: https://ethereum.org, max_pages: 300, include_paths: [/en/developers/docs/, /en/developers/tutorials/] }
    parity: critical
  - id: w3-solidity-docs
    connector: github_tree
    args: { slug: ethereum/solidity, branch: develop, file_extensions: [.rst, .md], include_paths: [docs/], max_files: 300 }
    parity: critical
  - id: w3-openzeppelin
    connector: github_tree
    args: { slug: OpenZeppelin/openzeppelin-contracts, branch: master, file_extensions: [.md], include_paths: [docs/], max_files: 100 }
    parity: critical
  - id: w3-foundry-book
    connector: github_tree
    args: { slug: foundry-rs/book, branch: master, file_extensions: [.md], include_paths: [src/], max_files: 200 }
    parity: critical
  - id: w3-hardhat-docs
    connector: sitemap
    args: { root: https://hardhat.org, max_pages: 200, include_paths: [/docs/] }
    parity: critical
  - id: w3-viem-docs
    connector: github_tree
    args: { slug: wevm/viem, branch: main, file_extensions: [.md, .mdx], include_paths: [site/pages/], max_files: 200 }
    parity: high
  - id: w3-wagmi-docs
    connector: github_tree
    args: { slug: wevm/wagmi, branch: main, file_extensions: [.md, .mdx], include_paths: [site/pages/], max_files: 200 }
    parity: high

tier2_canonical:
  - id: w3-eips
    connector: github_tree
    args: { slug: ethereum/EIPs, branch: master, file_extensions: [.md], include_paths: [EIPS/], max_files: 800 }
  - id: w3-yellow-paper
    connector: web
    args: { urls: ["https://ethereum.github.io/yellowpaper/paper.pdf"] }
  - id: w3-ercs
    connector: github_tree
    args: { slug: ethereum/ERCs, branch: master, file_extensions: [.md], include_paths: [ERCS/], max_files: 400 }

tier3_methodology:
  - id: w3-vitalik
    connector: sitemap
    args: { root: https://vitalik.eth.limo, max_pages: 200 }
  - id: w3-paradigm-research
    connector: sitemap
    args: { root: https://www.paradigm.xyz, max_pages: 100, include_paths: [/writing/] }
  - id: w3-a16z-crypto
    connector: sitemap
    args: { root: https://a16zcrypto.com, max_pages: 200 }

tier4_streams:
  - id: w3-solidity-releases
    connector: github_releases
    args: { slug: ethereum/solidity, max_releases: 30 }
  - id: w3-foundry-releases
    connector: github_releases
    args: { slug: foundry-rs/foundry, max_releases: 30 }
  - id: w3-viem-releases
    connector: github_releases
    args: { slug: wevm/viem, max_releases: 30 }
