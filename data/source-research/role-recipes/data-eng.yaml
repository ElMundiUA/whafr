role: data-eng
audit_domains:
- data-eng
queries_sample:
- dbt incremental model
- Airflow DAG patterns
- Iceberg table format
- Kafka exactly-once semantics
- Snowflake clustering key
- Spark window function
tier1_mainstream:
- id: de-dbt-docs
  connector: github_tree
  args:
    slug: dbt-labs/docs.getdbt.com
    branch: current
    file_extensions:
    - .md
    - .mdx
    include_paths:
    - website/docs/
    max_files: 400
  parity: critical
- id: de-airflow-docs
  connector: github_tree
  args:
    slug: apache/airflow
    branch: main
    file_extensions:
    - .rst
    - .md
    include_paths:
    - docs/
    max_files: 500
  parity: critical
- id: de-iceberg-docs
  connector: github_tree
  args:
    slug: apache/iceberg
    branch: main
    file_extensions:
    - .md
    include_paths:
    - docs/
    max_files: 200
  parity: critical
- id: de-delta-lake-docs
  connector: github_tree
  args:
    slug: delta-io/delta
    branch: master
    file_extensions:
    - .md
    max_files: 100
  parity: high
- id: de-kafka-docs
  connector: sitemap
  args:
    root: https://kafka.apache.org
    max_pages: 200
    include_paths:
    - /documentation
    - /quickstart
    - /streams/
  parity: critical
- id: de-flink-docs
  connector: github_tree
  args:
    slug: apache/flink
    branch: master
    file_extensions:
    - .md
    include_paths:
    - docs/content/
    max_files: 400
  parity: high
- id: de-spark-docs
  connector: sitemap
  args:
    root: https://spark.apache.org
    max_pages: 200
    include_paths:
    - /docs/latest/
  parity: critical
- id: de-snowflake-docs
  connector: sitemap
  args:
    root: https://docs.snowflake.com
    max_pages: 300
  parity: high
- id: de-databricks-docs
  connector: sitemap
  args:
    root: https://docs.databricks.com
    max_pages: 300
    include_paths:
    - /aws/en/
  parity: high
- id: de-bigquery-docs
  connector: sitemap
  args:
    root: https://cloud.google.com
    max_pages: 300
    include_paths:
    - /bigquery/docs/
  parity: high
- id: de-dagster-docs
  connector: github_tree
  args:
    slug: dagster-io/dagster
    branch: master
    file_extensions:
    - .md
    - .mdx
    include_paths:
    - docs/content/
    max_files: 300
  parity: high
tier2_canonical:
- id: de-parquet-spec
  connector: github_tree
  args:
    slug: apache/parquet-format
    branch: master
    file_extensions:
    - .md
    max_files: 30
- id: de-arrow-spec
  connector: sitemap
  args:
    root: https://arrow.apache.org
    max_pages: 200
    include_paths:
    - /docs/format/
    - /docs/specifications/
tier3_methodology:
- id: de-confluent-blog
  connector: sitemap
  args:
    root: https://www.confluent.io
    max_pages: 300
    include_paths:
    - /blog/
- id: de-dbt-blog
  connector: sitemap
  args:
    root: https://www.getdbt.com
    max_pages: 200
    include_paths:
    - /blog/
- id: de-databricks-blog
  connector: sitemap
  args:
    root: https://www.databricks.com
    max_pages: 200
    include_paths:
    - /blog/
tier4_streams:
- id: de-airflow-releases
  connector: github_releases
  args:
    slug: apache/airflow
    max_releases: 30
- id: de-iceberg-releases
  connector: github_releases
  args:
    slug: apache/iceberg
    max_releases: 30
- id: de-spark-releases
  connector: github_releases
  args:
    slug: apache/spark
    max_releases: 30
- id: de-dbt-releases
  connector: github_releases
  args:
    slug: dbt-labs/dbt-core
    max_releases: 30
