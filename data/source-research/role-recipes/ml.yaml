tier3_methodology:
- id: ml-karpathy
  connector: sitemap
  args:
    root: https://karpathy.github.io
    max_pages: 50
- id: ml-hf-blog
  connector: sitemap
  args:
    root: https://huggingface.co
    max_pages: 400
    include_paths:
    - /blog/
- id: ml-anthropic-engineering
  connector: sitemap
  args:
    root: https://www.anthropic.com
    max_pages: 200
    include_paths:
    - /engineering/
    - /research/
    - /news/
- id: ml-lilian-weng
  connector: sitemap
  args:
    root: https://lilianweng.github.io
    max_pages: 100
- id: ml-sebastian-raschka
  connector: sitemap
  args:
