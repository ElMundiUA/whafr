tier4_streams:
- id: ml-anthropic-rss
  connector: rss
  args:
    feeds:
    - https://www.anthropic.com/news/rss.xml
    max_entries: 50
    fetch_body_when_missing: true
- id: ml-pytorch-releases
  connector: github_releases
  args:
    slug: pytorch/pytorch
    max_releases: 30
- id: ml-transformers-releases
  connector: github_releases
  args:
    slug: huggingface/transformers
    max_releases: 30
- id: ml-vllm-releases
  connector: github_releases
