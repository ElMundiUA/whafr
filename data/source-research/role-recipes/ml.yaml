role: ml
audit_domains:
- ml
queries_sample:
- RAG chunking strategies
- vLLM continuous batching
- HuggingFace transformers AutoTokenizer
- PyTorch DataLoader workers
- prompt caching Anthropic Claude
- Model Context Protocol tool definition
- embedding model comparison Voyage Cohere
tier1_mainstream:
- id: ml-pytorch-docs
  connector: github_tree
  args:
    slug: pytorch/pytorch
    branch: main
    file_extensions:
    - .rst
    - .md
    include_paths:
    - docs/source/
    max_files: 600
  context7_id: /pytorch/pytorch
  parity: critical
- id: ml-pytorch-tutorials
  connector: github_tree
  args:
    slug: pytorch/tutorials
    branch: main
    file_extensions:
    - .md
    - .rst
    max_files: 500
  parity: critical
- id: ml-transformers-docs
  connector: github_tree
  args:
    slug: huggingface/transformers
    branch: main
    file_extensions:
    - .md
    include_paths:
    - docs/source/en/
    max_files: 800
  context7_id: /huggingface/transformers
  parity: critical
- id: ml-hf-datasets
  connector: github_tree
