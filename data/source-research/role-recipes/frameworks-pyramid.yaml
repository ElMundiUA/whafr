# "Frameworks pyramid" — Context7-style breadth.
#
# Not tied to a single role. Pulls canonical docs of the top ~30
# language-runtime-framework pairs that show up across roles. This
# is the "parity with Context7's library coverage" layer — depth
# of summary+keywords (E26-201 enrichment) is what differentiates
# us from their flat token dump.
#
# Picks were filtered by:
#   - GitHub stars > 30K
#   - Listed in latest Stack Overflow Survey "most used"
#   - Doc subtree publishable via github_tree (no SPA crawl needed)
#
# Cross-references docs/source-discovery-channels.md.

role: frameworks-pyramid
audit_domains: [developer, validation, performance, ml]
queries_sample: []

tier1_mainstream:
  # ── Python ecosystem ─────────────────────────────────────────────
  - id: fp-pydantic-docs
    connector: github_tree
    args: { slug: pydantic/pydantic, branch: main, file_extensions: [.md], include_paths: [docs/], max_files: 300 }
    parity: critical
  - id: fp-fastapi-docs
    connector: github_tree
    args: { slug: fastapi/fastapi, branch: master, file_extensions: [.md], include_paths: [docs/en/docs/], max_files: 400 }
    parity: critical
  - id: fp-django-docs
    connector: sitemap
    args: { root: https://docs.djangoproject.com, max_pages: 600 }
    parity: critical
  - id: fp-flask-docs
    connector: github_tree
    args: { slug: pallets/flask, branch: main, file_extensions: [.rst, .md], include_paths: [docs/], max_files: 200 }
    parity: high
  - id: fp-sqlalchemy-docs
    connector: sitemap
    args: { root: https://docs.sqlalchemy.org, max_pages: 500 }
    parity: critical
  - id: fp-celery-docs
    connector: sitemap
    args: { root: https://docs.celeryq.dev, max_pages: 200 }
    parity: high
  - id: fp-cpython-docs
    connector: sitemap
    args: { root: https://docs.python.org, max_pages: 700, include_paths: [/3/library/, /3/reference/, /3/tutorial/] }
    parity: critical
  - id: fp-pyo3-docs
    connector: github_tree
    args: { slug: PyO3/pyo3, branch: main, file_extensions: [.md], include_paths: [guide/src/], max_files: 100 }
    parity: medium
  - id: fp-anyio-docs
    connector: github_tree
    args: { slug: agronholm/anyio, branch: master, file_extensions: [.rst, .md], include_paths: [docs/], max_files: 50 }
    parity: high
  - id: fp-httpx-docs
    connector: github_tree
    args: { slug: encode/httpx, branch: master, file_extensions: [.md], include_paths: [docs/], max_files: 50 }
    parity: high
  - id: fp-ruff-docs
    connector: github_tree
    args: { slug: astral-sh/ruff, branch: main, file_extensions: [.md], include_paths: [docs/], max_files: 300 }
    parity: critical
  - id: fp-uv-docs
    connector: github_tree
    args: { slug: astral-sh/uv, branch: main, file_extensions: [.md], include_paths: [docs/], max_files: 100 }
    parity: high

  # ── JS / TS ecosystem ────────────────────────────────────────────
  - id: fp-typescript-handbook
    connector: github_tree
    args: { slug: microsoft/TypeScript-Website, branch: v2, file_extensions: [.md], include_paths: [packages/documentation/copy/en/], max_files: 200 }
    parity: critical
  - id: fp-react-dev
    connector: github_tree
    args: { slug: reactjs/react.dev, branch: main, file_extensions: [.md, .mdx], include_paths: [src/content/], max_files: 500 }
    parity: critical
  - id: fp-nextjs-docs
    connector: github_tree
    args: { slug: vercel/next.js, branch: canary, file_extensions: [.mdx], include_paths: [docs/], max_files: 400 }
    parity: critical
  - id: fp-svelte-docs
    connector: github_tree
    args: { slug: sveltejs/svelte, branch: main, file_extensions: [.md], include_paths: [documentation/], max_files: 200 }
    parity: critical
  - id: fp-vue-docs
    connector: github_tree
    args: { slug: vuejs/docs, branch: main, file_extensions: [.md], include_paths: [src/], max_files: 200 }
    parity: critical
  - id: fp-nuxt-docs
    connector: github_tree
    args: { slug: nuxt/nuxt, branch: main, file_extensions: [.md], include_paths: [docs/], max_files: 300 }
    parity: high
  - id: fp-astro-docs
    connector: github_tree
    args: { slug: withastro/docs, branch: main, file_extensions: [.md, .mdx], include_paths: [src/content/docs/en/], max_files: 300 }
    parity: high
  - id: fp-vite-docs
    connector: github_tree
    args: { slug: vitejs/vite, branch: main, file_extensions: [.md], include_paths: [docs/], max_files: 100 }
    parity: high
  - id: fp-tanstack-query
    connector: github_tree
    args: { slug: TanStack/query, branch: main, file_extensions: [.md], include_paths: [docs/], max_files: 200 }
    parity: high
  - id: fp-prisma-docs
    connector: github_tree
    args: { slug: prisma/docs, branch: main, file_extensions: [.md, .mdx], include_paths: [content/], max_files: 300 }
    parity: critical
  - id: fp-drizzle-docs
    connector: github_tree
    args: { slug: drizzle-team/drizzle-orm-docs, branch: main, file_extensions: [.md, .mdx], max_files: 200 }
    parity: high
  - id: fp-trpc-docs
    connector: github_tree
    args: { slug: trpc/trpc, branch: main, file_extensions: [.md, .mdx], include_paths: [www/docs/, docs/], max_files: 200 }
    parity: high
  - id: fp-zod-docs
    connector: github_tree
    args: { slug: colinhacks/zod, branch: main, file_extensions: [.md], max_files: 30 }
    parity: high

  # ── Go ecosystem ─────────────────────────────────────────────────
  - id: fp-go-docs
    connector: github_tree
    args: { slug: golang/go, branch: master, file_extensions: [.md], include_paths: [doc/], max_files: 200 }
    parity: critical
  - id: fp-gin-docs
    connector: github_tree
    args: { slug: gin-gonic/website, branch: main, file_extensions: [.md], include_paths: [docs/], max_files: 100 }
    parity: high
  - id: fp-echo-docs
    connector: github_tree
    args: { slug: labstack/echox, branch: master, file_extensions: [.md], include_paths: [website/], max_files: 100 }
    parity: medium

  # ── Rust ecosystem ───────────────────────────────────────────────
  - id: fp-rust-reference
    connector: github_tree
    args: { slug: rust-lang/reference, branch: master, file_extensions: [.md], include_paths: [src/], max_files: 200 }
    parity: critical
  - id: fp-rust-book
    connector: github_tree
    args: { slug: rust-lang/book, branch: main, file_extensions: [.md], include_paths: [src/], max_files: 200 }
    parity: critical
  - id: fp-tokio-docs
    connector: github_tree
    args: { slug: tokio-rs/website, branch: master, file_extensions: [.md, .mdx], include_paths: [content/], max_files: 200 }
    parity: critical
  - id: fp-axum-docs
    connector: github_tree
    args: { slug: tokio-rs/axum, branch: main, file_extensions: [.md], max_files: 50 }
    parity: high
  - id: fp-serde-docs
    connector: github_tree
    args: { slug: serde-rs/serde, branch: master, file_extensions: [.md], max_files: 30 }
    parity: medium

