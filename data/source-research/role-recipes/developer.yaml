# Role recipe: developer
#
# Compiled by `tools/role_recipe_compose.py` into the actual ingest
# yaml. Schema documented in docs/role-recipes.md.

role: developer
audit_domains: [developer, validation, performance]
queries_sample:
  - "FastAPI dependency injection session"
  - "Pydantic v2 field_validator before vs after"
  - "asyncio TaskGroup exception handling"
  - "SQLAlchemy 2.0 async select"
  - "ruff format vs black"
  - "anyio cancellation scope"
  - "Python 3.13 free-threaded mode"


# ──────────────────────────────────────────────────────────────────
# Tier 1 — mainstream tooling (Context7 parity)
#
# Picks: top GitHub-stars Python/Node tools that show up in the
# Stack Overflow Developer Survey AND in Context7 with trustScore≥7.
# Crawl path is github_tree (faster, deterministic) where the repo
# publishes docs alongside code.
# ──────────────────────────────────────────────────────────────────
tier1_mainstream:
  - id: dev-pydantic-docs
    connector: github_tree
    args:
      slug: pydantic/pydantic
      branch: main
      file_extensions: [.md]
      include_paths: [docs/]
      max_files: 300
    context7_id: /pydantic/pydantic
    rationale: "Foundational typing/validation lib."
    parity: critical

  - id: dev-fastapi-docs
    connector: github_tree
    args:
      slug: fastapi/fastapi
      branch: master
      file_extensions: [.md]
      include_paths: [docs/en/]
      max_files: 400
    context7_id: /fastapi/fastapi
    rationale: "Largest Python web framework by recent growth."
    parity: critical

  - id: dev-sqlalchemy-docs
    connector: sitemap
    args:
      root: https://docs.sqlalchemy.org
      max_pages: 400
    context7_id: /sqlalchemy/sqlalchemy
    rationale: "DB toolkit standard."
    parity: critical

  - id: dev-anyio-docs
    connector: github_tree
    args:
      slug: agronholm/anyio
      branch: master
      file_extensions: [.rst, .md]
      include_paths: [docs/]
      max_files: 100
    rationale: "Async primitives + structured concurrency."
    parity: high

  - id: dev-httpx-docs
    connector: github_tree
    args:
      slug: encode/httpx
      branch: master
      file_extensions: [.md]
      include_paths: [docs/]
      max_files: 100
    rationale: "Modern HTTP client. trio/asyncio compatible."
    parity: high

  - id: dev-ruff-docs
    connector: github_tree
    args:
      slug: astral-sh/ruff
      branch: main
      file_extensions: [.md]
      include_paths: [docs/]
      max_files: 300
    rationale: "Replaces flake8/black/isort. De-facto standard 2024+."
    parity: critical

  - id: dev-cpython-docs
    connector: sitemap
    args:
      root: https://docs.python.org
      max_pages: 500
      include_paths: [/3/library/, /3/reference/, /3/tutorial/]
    rationale: "Python stdlib reference. Versioned."
    parity: critical

  - id: dev-typescript-handbook
    connector: github_tree
    args:
      slug: microsoft/TypeScript-Website
      branch: v2
      file_extensions: [.md]
      include_paths: [packages/documentation/copy/en/]
      max_files: 200
    context7_id: /microsoft/typescript
    rationale: "TS handbook canonical."
    parity: critical

  - id: dev-react-docs
    connector: github_tree
    args:
      slug: reactjs/react.dev
      branch: main
      file_extensions: [.md, .mdx]
      include_paths: [src/content/]
      max_files: 500
    context7_id: /reactjs/react.dev
    rationale: "React canonical (Context7 has 3k snippets here)."
    parity: critical

  - id: dev-nextjs-docs
    connector: github_tree
    args:
      slug: vercel/next.js
      branch: canary
      file_extensions: [.mdx]
      include_paths: [docs/]
      max_files: 300
    context7_id: /vercel/next.js
    rationale: "Next.js App Router + server components."
    parity: critical

  - id: dev-django-docs
    connector: sitemap
    args:
      root: https://docs.djangoproject.com
      max_pages: 400
    context7_id: /django/django
    rationale: "Long-tail but high traffic."
    parity: high

  - id: dev-pytest-docs
    connector: sitemap
    args:
      root: https://docs.pytest.org
      max_pages: 200
    rationale: "Test runner standard for Python."
    parity: critical


# ──────────────────────────────────────────────────────────────────
# Tier 2 — canonical standards (differentiator)
#
# Standards documents Context7 has zero coverage of. Language refs,
# style standards, ECMAScript spec — depth wins here.
# ──────────────────────────────────────────────────────────────────
tier2_canonical:
  - id: dev-peps-index
    connector: sitemap
    args:
      root: https://peps.python.org
      max_pages: 700
    rationale: "Every Python Enhancement Proposal. PEP-8/257/484/695."

  - id: dev-ecma262-spec
    connector: web
    args:
      urls:
        - https://tc39.es/ecma262/
        - https://tc39.es/proposal-explicit-resource-management/
    rationale: "JavaScript language spec + active proposals."

  - id: dev-typing-pep
    connector: web
    args:
      urls:
        - https://typing.readthedocs.io/en/latest/spec/index.html
    rationale: "Python typing-spec consortium docs."

  - id: dev-python-language-ref
    connector: sitemap
    args:
      root: https://docs.python.org
      max_pages: 100
      include_paths: [/3/reference/]
    rationale: "Python language reference (separate from stdlib)."


# ──────────────────────────────────────────────────────────────────
# Tier 3 — methodology / practice (differentiator)
#
# Practitioner content. Patterns, idioms, why-it-works. Context7
# indexes framework docs, not the literature about using them well.
# ──────────────────────────────────────────────────────────────────
tier3_methodology:
  - id: dev-fowler-bliki
    connector: sitemap
    args:
      root: https://martinfowler.com
      max_pages: 600
      include_paths: [/bliki/, /eaaCatalog/, /articles/]
    rationale: "Refactoring, EAA patterns, ML deployment. Canon."

  - id: dev-refactoring-guru
    connector: sitemap
    args:
      root: https://refactoring.guru
      max_pages: 200
      include_paths: [/design-patterns/, /refactoring/]
    rationale: "Pattern catalog with examples in multiple languages."

  - id: dev-norvig-essays
    connector: web
    args:
      urls:
        - https://norvig.com/lispy.html
        - https://norvig.com/sudoku.html
        - https://norvig.com/spell-correct.html
        - https://norvig.com/lispy2.html
    rationale: "Peter Norvig essays — algorithmic depth."

  - id: dev-real-python
    connector: sitemap
    args:
      root: https://realpython.com
      max_pages: 400
    rationale: "High-quality Python tutorials. Editorially curated."


# ──────────────────────────────────────────────────────────────────
# Tier 4 — streaming / time-aware (differentiator)
#
# RSS + GitHub release notes. Per-chunk published_at gives us
# `search(query, after=cutoff)` answers Context7 can't provide.
# ──────────────────────────────────────────────────────────────────
tier4_streams:
  - id: dev-python-blog
    connector: rss
    args:
      feeds: [https://blog.python.org/feeds/posts/default]
      max_entries: 50
    rationale: "Python core team announcements."

  - id: dev-pep-talks
    connector: rss
    args:
      feeds: [https://lwn.net/headlines/Articles/]
      max_entries: 30
    rationale: "LWN often covers PEP / CPython internals."

  - id: dev-typescript-releases
    connector: github_releases
    args: {slug: microsoft/TypeScript, max_releases: 30}
    rationale: "TS release notes — per-version semantics."

  - id: dev-pydantic-releases
    connector: github_releases
    args: {slug: pydantic/pydantic, max_releases: 30}
    rationale: "V1→V2→V3 migration deltas."

  - id: dev-fastapi-releases
    connector: github_releases
    args: {slug: fastapi/fastapi, max_releases: 30}
    rationale: "API surface changes."

  - id: dev-sqlalchemy-releases
    connector: github_releases
    args: {slug: sqlalchemy/sqlalchemy, max_releases: 30}
    rationale: "1.4 → 2.0 was a major break; ongoing 2.x deltas."

  - id: dev-react-releases
    connector: github_releases
    args: {slug: facebook/react, max_releases: 30}
    rationale: "RSC / Suspense / Actions evolution."
