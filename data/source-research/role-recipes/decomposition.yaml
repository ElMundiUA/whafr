# Role recipe: decomposition (WBS / story slicing)
role: decomposition
audit_domains: [decomposition]
queries_sample:
  - "work breakdown structure technique"
  - "epic to story decomposition"
  - "MECE feature breakdown"
  - "INVEST sliced stories vertical"
  - "dependency mapping engineering tasks"

tier1_mainstream:
  - id: dc-mountain-goat
    connector: sitemap
    args: { root: https://www.mountaingoatsoftware.com, max_pages: 200 }
    parity: critical
  - id: dc-romanpichler
    connector: sitemap
    args: { root: https://www.romanpichler.com, max_pages: 200, include_paths: [/blog/] }
    parity: critical
  - id: dc-jpatton
    connector: sitemap
    args: { root: https://www.jpattonassociates.com, max_pages: 100 }
    parity: critical
  - id: dc-agileforall
    connector: sitemap
    args: { root: https://agileforall.com, max_pages: 100 }
    parity: high

tier2_canonical:
  - id: dc-scrum-guide
    connector: web
    args: { urls: ["https://scrumguides.org/scrum-guide.html"] }
  - id: dc-invest-criteria
    connector: web
    args: { urls: ["https://agilealliance.org/glossary/invest/"] }

tier3_methodology:
  - id: dc-humanizing-work
    connector: sitemap
    args: { root: https://www.humanizingwork.com, max_pages: 100 }
  - id: dc-fowler-architecture
    connector: sitemap
    args: { root: https://martinfowler.com, max_pages: 200, include_paths: [/articles/, /bliki/] }
  - id: dc-safe-framework
    connector: sitemap
    args: { root: https://scaledagileframework.com, max_pages: 200 }
  - id: dc-less-works
    connector: sitemap
    args: { root: https://less.works, max_pages: 100 }

tier4_streams: []
