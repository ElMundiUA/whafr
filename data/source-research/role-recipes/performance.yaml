# Role recipe: performance

role: performance
audit_domains: [performance]
queries_sample:
  - "Core Web Vitals LCP CLS INP"
  - "flame graph CPU profile"
  - "DB connection pool exhaustion"
  - "p95 vs p99 latency"
  - "k6 load test scenarios"
  - "Java GC tuning G1"
  - "Postgres EXPLAIN ANALYZE"

tier1_mainstream:
  - id: perf-webdev-content
    connector: github_tree
    args: { slug: GoogleChrome/web.dev, branch: main, file_extensions: [.md, .njk], include_paths: [src/site/content/en/], max_files: 1500 }
    parity: critical
  - id: perf-mdn-performance
    connector: github_tree
    args: { slug: mdn/content, branch: main, file_extensions: [.md], include_paths: [files/en-us/web/performance/], max_files: 300 }
    parity: critical
  - id: perf-chrome-devtools-docs
    connector: github_tree
    args: { slug: GoogleChrome/developer.chrome.com, branch: main, file_extensions: [.md], include_paths: [site/en/docs/devtools/], max_files: 300 }
    parity: high
  - id: perf-k6-docs
    connector: github_tree
    args: { slug: grafana/k6-docs, branch: main, file_extensions: [.md, .mdx], max_files: 400 }
    parity: critical
  - id: perf-pg-explain-docs
    connector: sitemap
    args: { root: https://www.postgresql.org, max_pages: 200, include_paths: [/docs/current/sql-explain.html, /docs/current/using-explain.html, /docs/current/performance-tips.html, /docs/current/indexes.html] }
    parity: critical
  - id: perf-pg-stat-statements
    connector: web
    args: { urls: ["https://www.postgresql.org/docs/current/pgstatstatements.html"] }
    parity: high
  - id: perf-async-profiler
    connector: github_tree
    args: { slug: async-profiler/async-profiler, branch: master, file_extensions: [.md], max_files: 50 }
    parity: medium
  - id: perf-pyperf
    connector: github_tree
    args: { slug: psf/pyperf, branch: main, file_extensions: [.rst, .md], include_paths: [doc/], max_files: 50 }
    parity: medium

tier2_canonical:
  - id: perf-rfc-http-perf
    connector: web
    args:
      urls:
        - https://datatracker.ietf.org/doc/html/rfc9110   # HTTP semantics
        - https://datatracker.ietf.org/doc/html/rfc7234   # HTTP caching (obsoleted)
        - https://datatracker.ietf.org/doc/html/rfc9111   # HTTP caching
        - https://datatracker.ietf.org/doc/html/rfc7945   # HTTP performance hints
  - id: perf-web-vitals-spec
    connector: github_tree
    args: { slug: w3c/web-vitals, branch: master, file_extensions: [.md], max_files: 30 }
  - id: perf-jvm-spec
    connector: web
    args: { urls: ["https://docs.oracle.com/javase/specs/jvms/se21/html/index.html"] }

tier3_methodology:
  - id: perf-brendan-gregg
    connector: sitemap
    args: { root: https://www.brendangregg.com, max_pages: 250 }
  - id: perf-andy-davies
    connector: sitemap
    args: { root: https://andydavies.me, max_pages: 100 }
  - id: perf-smashing-perf
    connector: sitemap
    args: { root: https://www.smashingmagazine.com, max_pages: 200, include_paths: [/category/performance/] }
  - id: perf-k6-blog
    connector: sitemap
    args: { root: https://k6.io, max_pages: 150, include_paths: [/blog/] }
  - id: perf-vlad-mihalcea
    connector: sitemap
    args: { root: https://vladmihalcea.com, max_pages: 200, include_paths: [/blog/] }

tier4_streams:
  - id: perf-k6-releases
    connector: github_releases
    args: { slug: grafana/k6, max_releases: 30 }
  - id: perf-async-profiler-releases
    connector: github_releases
    args: { slug: async-profiler/async-profiler, max_releases: 30 }
  - id: perf-postgres-releases
    connector: github_releases
    args: { slug: postgres/postgres, max_releases: 30 }
