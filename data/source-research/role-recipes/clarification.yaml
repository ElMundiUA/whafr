role: clarification
audit_domains:
- clarification
queries_sample:
- acceptance criteria template gherkin
- INVEST story principles
- definition of ready checklist
- clarifying questions BA backlog
- given when then format
tier1_mainstream:
- id: cl-cucumber-docs
  connector: sitemap
  args:
    root: https://cucumber.io
    max_pages: 200
    include_paths:
    - /docs/
  parity: critical
- id: cl-atlassian-agile
  connector: sitemap
  args:
    root: https://www.atlassian.com
    max_pages: 200
    include_paths:
    - /agile/
  parity: critical
- id: cl-mountain-goat
  connector: sitemap
  args:
    root: https://www.mountaingoatsoftware.com
    max_pages: 200
    include_paths:
    - /blog/
  parity: critical
- id: cl-agile-alliance
  connector: sitemap
  args:
    root: https://www.agilealliance.org
    max_pages: 300
  parity: critical
- name: cl-gherkin-reference
  connector: web
  args:
    urls:
    - https://cucumber.io/docs/gherkin/reference/
    - https://cucumber.io/docs/bdd/
    - https://cucumber.io/docs/bdd/example-mapping/
    - https://cucumber.io/docs/bdd/discovery/
    - https://cucumber.io/docs/bdd/formulation/
  schedule:
    every: 30d
- name: cl-acceptance-criteria
  connector: web
  args:
    urls:
    - https://www.atlassian.com/agile/project-management/user-stories
    - https://www.productplan.com/glossary/acceptance-criteria/
    - https://www.aha.io/roadmapping/guide/agile/what-are-acceptance-criteria
    - https://lucidchart.com/blog/how-to-write-acceptance-criteria
  schedule:
    every: 60d
- name: cl-liz-keogh
  connector: sitemap
  args:
    root: https://lizkeogh.com
    max_pages: 80
  schedule:
    every: 60d
- name: cl-dan-north
  connector: web
  args:
    urls:
    - https://dannorth.net/introducing-bdd/
    - https://dannorth.net/whats-in-a-story/
    - https://dannorth.net/bdd-is-like-tdd-if/
  schedule:
    every: 90d
- name: cl-specification-by-example
  connector: web
  args:
    urls:
    - https://gojko.net/2008/11/04/specifying-with-examples/
    - https://gojko.net/2014/06/30/specification-by-example-summarized-in-10-minutes/
  schedule:
    every: 90d
tier2_canonical:
- id: cl-agile-manifesto
  connector: web
  args:
    urls:
    - https://agilemanifesto.org/
    - https://agilemanifesto.org/principles.html
- id: cl-invest
  connector: web
  args:
    urls:
    - https://agilealliance.org/glossary/invest/
- id: cl-gherkin-spec
  connector: github_tree
  args:
    slug: cucumber/cucumber
    branch: main
    file_extensions:
    - .md
    include_paths:
    - gherkin/
    max_files: 50
tier3_methodology:
- id: cl-fowler-bliki
  connector: sitemap
  args:
    root: https://martinfowler.com
    max_pages: 300
    include_paths:
    - /bliki/
    - /articles/
- id: cl-jpatton
  connector: sitemap
  args:
    root: https://www.jpattonassociates.com
    max_pages: 100
- id: cl-romanpichler
  connector: sitemap
  args:
    root: https://www.romanpichler.com
    max_pages: 200
    include_paths:
    - /blog/
- id: cl-domain-language
  connector: sitemap
  args:
    root: https://www.domainlanguage.com
    max_pages: 100
- id: cl-basecamp-shapeup
  connector: sitemap
  args:
    root: https://basecamp.com
    max_pages: 100
    include_paths:
    - /shapeup/
tier4_streams: []
