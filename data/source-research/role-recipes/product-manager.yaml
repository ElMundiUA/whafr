# Role recipe: product-manager

role: product-manager
audit_domains: [product-manager]
queries_sample:
  - "RICE prioritization framework"
  - "PRD template best practices"
  - "JTBD framework outcomes"
  - "HEART success metrics"
  - "Cagan product trio"
  - "continuous discovery interview"
  - "OKR vs KPI difference"

tier1_mainstream:
  - id: pm-amplitude-blog
    connector: sitemap
    args: { root: https://amplitude.com, max_pages: 200, include_paths: [/blog/] }
    parity: high
  - id: pm-mixpanel-blog
    connector: sitemap
    args: { root: https://mixpanel.com, max_pages: 100, include_paths: [/blog/] }
    parity: high
  - id: pm-productplan
    connector: sitemap
    args: { root: https://www.productplan.com, max_pages: 200, include_paths: [/learn/, /glossary/] }
    parity: critical
  - id: pm-productboard
    connector: sitemap
    args: { root: https://www.productboard.com, max_pages: 150, include_paths: [/blog/, /learn/] }
    parity: high
  - id: pm-aha-io
    connector: sitemap
    args: { root: https://www.aha.io, max_pages: 150, include_paths: [/roadmapping/] }
    parity: high
  - id: pm-intercom-blog
    connector: sitemap
    args: { root: https://www.intercom.com, max_pages: 200, include_paths: [/blog/] }
    parity: medium
  - id: pm-atlassian-agile
    connector: sitemap
    args: { root: https://www.atlassian.com, max_pages: 200, include_paths: [/agile/, /work-management/project-management/] }
    parity: critical

tier2_canonical:
  - id: pm-agile-manifesto
    connector: web
    args: { urls: ["https://agilemanifesto.org/", "https://agilemanifesto.org/principles.html"] }
  - id: pm-scrum-guide
    connector: web
    args: { urls: ["https://scrumguides.org/scrum-guide.html"] }
  - id: pm-google-heart
    connector: web
    args: { urls: ["https://research.google/pubs/measuring-the-user-experience-on-a-large-scale-user-centered-metrics-for-web-applications/"] }

tier3_methodology:
  - id: pm-svpg-cagan
    connector: sitemap
    args: { root: https://www.svpg.com, max_pages: 300, include_paths: [/articles/] }
  - id: pm-producttalk-torres
    connector: sitemap
    args: { root: https://www.producttalk.org, max_pages: 200 }
  - id: pm-jpattonassociates
    connector: sitemap
    args: { root: https://www.jpattonassociates.com, max_pages: 100 }
  - id: pm-romanpichler
    connector: sitemap
    args: { root: https://www.romanpichler.com, max_pages: 200, include_paths: [/blog/] }
  - id: pm-mindtheproduct
    connector: sitemap
    args: { root: https://www.mindtheproduct.com, max_pages: 300, include_paths: [/blog/, /articles/] }
  - id: pm-lenny-newsletter-free
    connector: sitemap
    args: { root: https://www.lennysnewsletter.com, max_pages: 200 }
  - id: pm-melissa-perri
    connector: sitemap
    args: { root: https://melissaperri.com, max_pages: 50, include_paths: [/blog/] }

tier4_streams:
  - id: pm-svpg-rss
    connector: rss
    args: { feeds: ["https://www.svpg.com/articles/feed/"], max_entries: 50, fetch_body_when_missing: true }
  - id: pm-producttalk-rss
    connector: rss
    args: { feeds: ["https://www.producttalk.org/feed/"], max_entries: 50, fetch_body_when_missing: true }
  - id: pm-mindtheproduct-rss
    connector: rss
    args: { feeds: ["https://www.mindtheproduct.com/feed/"], max_entries: 50, fetch_body_when_missing: true }
