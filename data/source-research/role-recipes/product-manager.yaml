    root: https://www.productboard.com
    max_pages: 150
    include_paths:
    - /blog/
    - /learn/
  parity: high
- id: pm-aha-io
  connector: sitemap
  args:
    root: https://www.aha.io
    max_pages: 150
    include_paths:
    - /roadmapping/
  parity: high
- id: pm-intercom-blog
