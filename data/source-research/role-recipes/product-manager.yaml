- name: pm-jtbd
  connector: web
  args:
    urls:
    - https://jtbd.info/2-what-is-jobs-to-be-done-jtbd-796b82081cca
    - https://strategyn.com/jobs-to-be-done/
    - https://strategyn.com/jobs-to-be-done/needs/
    - https://hbr.org/2016/09/know-your-customers-jobs-to-be-done
