# Role recipe: embedded (firmware, RTOS, IoT, MCU)
role: embedded
audit_domains: [embedded]
queries_sample:
  - "FreeRTOS task notification"
  - "Zephyr device tree"
  - "ESP-IDF NVS storage"
  - "MQTT QoS levels"
  - "PlatformIO build flags"
  - "Bluetooth LE GATT services"

tier1_mainstream:
  - id: em-esp-idf-docs
    connector: sitemap
    args: { root: https://docs.espressif.com, max_pages: 400, include_paths: [/projects/esp-idf/] }
    parity: critical
  - id: em-zephyr-docs
    connector: sitemap
    args: { root: https://docs.zephyrproject.org, max_pages: 400 }
    parity: critical
  - id: em-platformio-docs
    connector: sitemap
    args: { root: https://docs.platformio.org, max_pages: 300 }
    parity: critical
  - id: em-freertos-docs
    connector: sitemap
    args: { root: https://www.freertos.org, max_pages: 200, include_paths: [/Documentation/] }
    parity: critical
  - id: em-arduino-docs
    connector: sitemap
    args: { root: https://docs.arduino.cc, max_pages: 200 }
    parity: high
  - id: em-nrf-connect-sdk
    connector: sitemap
    args: { root: https://docs.nordicsemi.com, max_pages: 300, include_paths: [/bundle/ncs-latest/] }
    parity: high

tier2_canonical:
  - id: em-mqtt-oasis
    connector: web
    args: { urls: ["https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html"] }
  - id: em-coap
    connector: web
    args: { urls: ["https://datatracker.ietf.org/doc/html/rfc7252"] }
  - id: em-bluetooth-core
    connector: web
    args: { urls: ["https://www.bluetooth.com/specifications/specs/core-specification-5-4/"] }

tier3_methodology:
  - id: em-interrupt-blog
    connector: sitemap
    args: { root: https://interrupt.memfault.com, max_pages: 200 }
  - id: em-hackaday
    connector: sitemap
    args: { root: https://hackaday.com, max_pages: 200, include_paths: [/blog/] }

tier4_streams:
  - id: em-zephyr-releases
    connector: github_releases
    args: { slug: zephyrproject-rtos/zephyr, max_releases: 30 }
  - id: em-esp-idf-releases
    connector: github_releases
    args: { slug: espressif/esp-idf, max_releases: 30 }
