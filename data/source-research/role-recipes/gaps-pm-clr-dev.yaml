# Targeted-URL recipe for the 3 weak domains identified by the May 18
# coverage audit: product-manager, clarification, developer. The
# original recipes for these roles relied on sitemap crawls of
# fowler.com / cucumber.io / svpg.com — those mostly returned
# nav/marketing pages, leaving us with a handful of off-topic chunks
# per source. This recipe replaces breadth with depth: every entry is
# either a single canonical URL via the `web` connector or a
# path-pinned github_tree call. Quick to ingest, predictable yield,
# matches the queries in data/coverage-eval/queries.yaml.

role: gaps-pm-clr-dev
role_tier: 1
sources:
  # ---------- product-manager ----------
  - name: pm-rice-intercom
    role: product-manager
    connector: web
    args:
      urls:
        - https://www.intercom.com/blog/rice-simple-prioritization-for-product-managers/
        - https://www.productplan.com/glossary/rice-scoring-model/
        - https://www.aha.io/roadmapping/guide/product-strategy/prioritization-frameworks
    schedule: { every: 60d }

  - name: pm-svpg-cagan
    role: product-manager
    connector: web
    args:
      urls:
        - https://www.svpg.com/discovery-coaching/
        - https://www.svpg.com/product-trio/
        - https://www.svpg.com/empowered-product-teams/
        - https://www.svpg.com/inspired-how-to-create-products-customers-love-2/
        - https://www.svpg.com/four-big-risks/
    schedule: { every: 60d }

  - name: pm-jtbd
    role: product-manager
    connector: web
    args:
      urls:
        - https://jtbd.info/2-what-is-jobs-to-be-done-jtbd-796b82081cca
        - https://strategyn.com/jobs-to-be-done/
        - https://strategyn.com/jobs-to-be-done/needs/
        - https://hbr.org/2016/09/know-your-customers-jobs-to-be-done
    schedule: { every: 60d }

  - name: pm-heart-metrics
    role: product-manager
    connector: web
    args:
      urls:
        - https://research.google/pubs/measuring-the-user-experience-on-a-large-scale-user-centered-metrics-for-web-applications/
        - https://library.gv.com/the-google-heart-framework-for-measuring-user-experience-on-a-large-scale-a32cc54d8af1
    schedule: { every: 90d }

  - name: pm-prd-templates
    role: product-manager
    connector: web
    args:
      urls:
        - https://www.lennysnewsletter.com/p/how-to-write-a-prd
        - https://www.atlassian.com/agile/product-management/requirements
        - https://www.productplan.com/glossary/product-requirements-document/
        - https://www.aha.io/roadmapping/guide/requirements-management/what-is-a-good-product-requirements-document-template
    schedule: { every: 60d }

  - name: pm-product-talk-torres
    role: product-manager
    connector: sitemap
    args:
      root: https://www.producttalk.org
      max_pages: 100
      include_paths: [/blog/]
    schedule: { every: 30d }

  # ---------- clarification ----------
  - name: cl-gherkin-reference
    role: clarification
    connector: web
    args:
      urls:
        - https://cucumber.io/docs/gherkin/reference/
        - https://cucumber.io/docs/bdd/
        - https://cucumber.io/docs/bdd/example-mapping/
        - https://cucumber.io/docs/bdd/discovery/
        - https://cucumber.io/docs/bdd/formulation/
    schedule: { every: 30d }

  - name: cl-acceptance-criteria
    role: clarification
    connector: web
    args:
      urls:
        - https://www.atlassian.com/agile/project-management/user-stories
        - https://www.productplan.com/glossary/acceptance-criteria/
        - https://www.aha.io/roadmapping/guide/agile/what-are-acceptance-criteria
        - https://lucidchart.com/blog/how-to-write-acceptance-criteria
    schedule: { every: 60d }

  - name: cl-liz-keogh
    role: clarification
    connector: sitemap
    args:
      root: https://lizkeogh.com
      max_pages: 80
    schedule: { every: 60d }

  - name: cl-dan-north
    role: clarification
    connector: web
    args:
      urls:
        - https://dannorth.net/introducing-bdd/
        - https://dannorth.net/whats-in-a-story/
        - https://dannorth.net/bdd-is-like-tdd-if/
    schedule: { every: 90d }

  - name: cl-specification-by-example
    role: clarification
    connector: web
    args:
      urls:
        - https://gojko.net/2008/11/04/specifying-with-examples/
        - https://gojko.net/2014/06/30/specification-by-example-summarized-in-10-minutes/
    schedule: { every: 90d }

  # ---------- developer ----------
  - name: dev-fastapi-patterns
    role: developer
    connector: web
    args:
      urls:
        - https://fastapi.tiangolo.com/tutorial/dependencies/
        - https://fastapi.tiangolo.com/tutorial/dependencies/dependencies-with-yield/
        - https://fastapi.tiangolo.com/tutorial/dependencies/classes-as-dependencies/
        - https://fastapi.tiangolo.com/tutorial/dependencies/sub-dependencies/
        - https://fastapi.tiangolo.com/advanced/async-tests/
        - https://fastapi.tiangolo.com/advanced/events/
    schedule: { every: 30d }

  - name: dev-sqlalchemy-async
    role: developer
    connector: web
    args:
      urls:
        - https://docs.sqlalchemy.org/en/20/orm/extensions/asyncio.html
        - https://docs.sqlalchemy.org/en/20/orm/contextual.html
        - https://docs.sqlalchemy.org/en/20/orm/session_basics.html
        - https://docs.sqlalchemy.org/en/20/core/pooling.html
    schedule: { every: 30d }

  - name: dev-pydantic-v2
    role: developer
    connector: web
    args:
      urls:
        - https://docs.pydantic.dev/latest/concepts/validators/
        - https://docs.pydantic.dev/latest/concepts/fields/
        - https://docs.pydantic.dev/latest/concepts/models/
        - https://docs.pydantic.dev/latest/concepts/types/
        - https://docs.pydantic.dev/latest/concepts/serialization/
        - https://docs.pydantic.dev/latest/migration/
    schedule: { every: 30d }

  - name: dev-python-asyncio
    role: developer
    connector: web
    args:
      urls:
        - https://docs.python.org/3/library/asyncio-task.html
        - https://docs.python.org/3/library/asyncio-stream.html
        - https://docs.python.org/3/library/asyncio-sync.html
        - https://docs.python.org/3/library/asyncio-exceptions.html
        - https://docs.python.org/3/library/contextlib.html
    schedule: { every: 60d }

  - name: dev-typescript-handbook
    role: developer
    connector: github_tree
    args:
      slug: microsoft/TypeScript-Website
      branch: v2
      file_extensions: [.md]
      include_paths: [packages/documentation/copy/en/handbook-v2/]
      max_files: 100
    schedule: { every: 60d }

  - name: dev-anthropic-prompt-caching
    role: developer
    connector: web
    args:
      urls:
        - https://docs.claude.com/en/docs/build-with-claude/prompt-caching
        - https://docs.claude.com/en/docs/build-with-claude/tool-use/overview
        - https://docs.claude.com/en/api/messages-streaming
        - https://docs.claude.com/en/docs/build-with-claude/extended-thinking
    schedule: { every: 30d }

  - name: dev-react-patterns
    role: developer
    connector: web
    args:
      urls:
        - https://react.dev/learn/you-might-not-need-an-effect
        - https://react.dev/learn/escape-hatches
        - https://react.dev/reference/react/useTransition
        - https://react.dev/reference/react/useDeferredValue
        - https://react.dev/learn/render-and-commit
    schedule: { every: 60d }
