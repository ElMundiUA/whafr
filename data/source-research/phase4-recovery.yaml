# Phase 4 recovery — sources surfaced by wave-4 persona audits.
# (build systems, ML infra, browser internals, email engineering,
# DDD / architecture). Combined with phases 1-3, this closes another
# 60+ canonical sources across previously-100%-gap surfaces.
sources:

  # ── Build systems / bundlers (90% gap) ────────────────────────────
  - name: build-bazel
    connector: sitemap
    args:
      root: https://bazel.build
      max_pages: 200
    schedule:
      every: 60d
  - name: build-turbo
    connector: sitemap
    args:
      root: https://turborepo.com
      max_pages: 150
    schedule:
      every: 30d
  - name: build-nx
    connector: sitemap
    args:
      root: https://nx.dev
      max_pages: 200
    schedule:
      every: 30d
  - name: build-vite
    connector: sitemap
    args:
      root: https://vite.dev
      max_pages: 150
    schedule:
      every: 30d
  - name: build-esbuild
    connector: sitemap
    args:
      root: https://esbuild.github.io
      max_pages: 100
    schedule:
      every: 60d
  - name: build-docker-buildkit
    connector: sitemap
    args:
      root: https://docs.docker.com
      max_pages: 250
      include_paths: ["/build/"]
    schedule:
      every: 30d
  - name: build-renovate
    connector: sitemap
    args:
      root: https://docs.renovatebot.com
      max_pages: 150
    schedule:
      every: 60d
  - name: build-changesets
    connector: web
    args:
