# Popularity index — canonical "should-have" libraries with their
# expected match patterns against chunks.source and the source
# snippet to append to a role recipe if missing.
#
# Used by tools/find_gaps.py to find coverage gaps systematically.
# Owning role = which per-role recipe file the new source should
# be appended to (data/source-research/role-recipes/<role>.yaml).
#
# Hand-curated. Tier reflects how often agents will hit each lib.
#   T1 = ubiquitous mainstream (every Node/Python/React project)
#   T2 = popular within its niche
#   T3 = canonical-but-niche
#
# Coverage thresholds: <expected_chunks_min> chunks => 🟢 covered,
# 1..min-1 => 🟡 thin, 0 => 🔴 missing.

libraries:
  # ===== Web backend (Node) =====
  - { name: NestJS,     role: developer,            tier: 1, match: [nestjs/nest, nestjs/docs.nestjs.com, docs.nestjs.com], expected_chunks_min: 80, source: { name: dev-nestjs-docs,     connector: github_tree, args: { slug: nestjs/docs.nestjs.com, branch: master, include_paths: [content/], file_extensions: [.md], max_files: 250 } } }
  - { name: Express,    role: developer,            tier: 1, match: [expressjs/express, expressjs.com],                    expected_chunks_min: 30, source: { name: dev-express-docs,    connector: github_tree, args: { slug: expressjs/expressjs.com, branch: gh-pages, include_paths: [en/], file_extensions: [.md], max_files: 200 } } }
