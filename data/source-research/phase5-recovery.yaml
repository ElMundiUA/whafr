# Phase 5 — sources surfaced by wave-5 audit
# (SRE, identity/auth, streaming/Kafka, distributed DBs, frontend frameworks)
sources:

  # ── SRE / chaos engineering (84% gap) ─────────────────────────────
  - name: sre-google-workbook
    connector: sitemap
    args:
      root: https://sre.google
      max_pages: 200
    schedule:
      every: 60d
  - name: sre-aws-builders-library
    connector: sitemap
    args:
      root: https://aws.amazon.com
      max_pages: 200
      include_paths: ["/builders-library/"]
    schedule:
      every: 60d
  - name: sre-chaos-mesh
    connector: sitemap
    args:
      root: https://chaos-mesh.org
      max_pages: 150
    schedule:
      every: 60d
  - name: sre-litmus
    connector: sitemap
    args:
      root: https://docs.litmuschaos.io
      max_pages: 150
    schedule:
      every: 60d
  - name: sre-aws-fis
    connector: sitemap
    args:
      root: https://docs.aws.amazon.com
      max_pages: 150
      include_paths: ["/fis/"]
    schedule:
      every: 60d
  - name: sre-principles-of-chaos
    connector: sitemap
    args:
      root: https://principlesofchaos.org
      max_pages: 30
    schedule:
      every: 90d

  # ── Identity / auth (97% gap) ─────────────────────────────────────
  - name: auth-oauth-spec
    connector: web
    args:
      urls:
        - https://oauth.net/2.1/
        - https://datatracker.ietf.org/doc/html/rfc6749
        - https://datatracker.ietf.org/doc/html/rfc7636
        - https://datatracker.ietf.org/doc/html/rfc9126
        - https://datatracker.ietf.org/doc/html/rfc9449
        - https://datatracker.ietf.org/doc/html/rfc8705
        - https://datatracker.ietf.org/doc/html/rfc8628
    schedule:
      every: 365d
  - name: auth-openid
    connector: web
    args:
      urls:
        - https://openid.net/specs/openid-connect-core-1_0.html
        - https://openid.net/specs/openid-connect-discovery-1_0.html
    schedule:
      every: 365d
  - name: auth-webauthn
    connector: web
    args:
      urls:
        - https://www.w3.org/TR/webauthn-3/
        - https://passkeys.dev/docs/
    schedule:
      every: 180d
  - name: auth-scim-saml
    connector: web
    args:
      urls:
        - https://datatracker.ietf.org/doc/html/rfc7644
        - https://datatracker.ietf.org/doc/html/rfc7643
        - https://docs.oasis-open.org/security/saml/v2.0/saml-core-2.0-os.pdf
    schedule:
      every: 365d
  - name: auth-keycloak
    connector: sitemap
    args:
      root: https://www.keycloak.org
      max_pages: 150
    schedule:
      every: 60d
  - name: auth-clerk-stytch
    connector: sitemap
    args:
      root: https://clerk.com
      max_pages: 150
      include_paths: ["/docs"]
    schedule:
      every: 60d

