# Phase 1 recovery — high-leverage sources to fill the gaps the
# 2026-05-15 audit surfaced. Run with the fixed ``lighthouse.ingest``
# (commit 8f13f32+) so a Pydantic validation on one extracted entity
# doesn't kill the whole source any more.
#
# Strategy: one source per coverage hole identified across the 10
# sub-agent probes. Each is large enough to be meaningful but bounded
# (max_pages 100-250) so a 25-source pass finishes in a few hours, not
# a few days. Re-ingest is idempotent — Graphiti dedups entities
# across runs.
sources:

  # ── Architecture & patterns (93% gap) ─────────────────────────────
  - name: arch-fowler-bliki
    connector: sitemap
    args:
      root: https://martinfowler.com
      max_pages: 250
    schedule:
      every: 60d
  - name: arch-microservices-io
    connector: sitemap
    args:
      root: https://microservices.io
      max_pages: 100
    schedule:
      every: 60d
  - name: arch-crdt-tech
    connector: sitemap
    args:
      root: https://crdt.tech
      max_pages: 50
    schedule:
      every: 90d
  - name: arch-jepsen
    connector: sitemap
    args:
      root: https://aphyr.com
      max_pages: 100
    schedule:
      every: 90d

  # ── DevOps & infra (87% gap) ──────────────────────────────────────
  - name: devops-k8s-concepts
    connector: sitemap
    args:
      root: https://kubernetes.io
      max_pages: 300
      include_paths: ["/docs/concepts/"]
    schedule:
      every: 30d
