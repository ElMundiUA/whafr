# Phase 9b — SPA-doc workaround via the github_tree connector.
#
# Replaces phase9-spa-fix.yaml. The old version used the llama-index-
# backed ``github`` connector which throws ``KeyError: 'commit'`` on
# huge trees (mdn/content, GoogleChromeLabs/web.dev, reactjs/react.dev,
# kubernetes/website). ``github_tree`` hits the GitHub REST API
# directly and handles paged trees natively. Path filters keep us
# from blowing the 5K-rate limit on monorepos.
sources:

  # ── MDN Web/API — keep to the /files/en-us/web subtree only ───────
  - name: web-mdn-content-v2
    connector: github_tree
    args:
      slug: mdn/content
      branch: main
      file_extensions: [.md]
      include_paths:
        - files/en-us/web/api/
        - files/en-us/web/javascript/
        - files/en-us/web/css/
        - files/en-us/web/html/
        - files/en-us/web/http/
        - files/en-us/web/performance/
        - files/en-us/web/security/
        - files/en-us/web/accessibility/
      max_files: 3000
    schedule: { every: 60d }

  # ── web.dev articles (Core Web Vitals, performance) ───────────────
  - name: web-googlechromelabs-webdev-v2
    connector: github_tree
    args:
      slug: GoogleChromeLabs/web.dev
      branch: main
      file_extensions: [.md, .mdx]
      include_paths: [src/site/content/en/]
      max_files: 1500
    schedule: { every: 30d }

  # ── react.dev (hooks, Suspense, RSC) ──────────────────────────────
  - name: fe-reactjs-react-dev-v2
    connector: github_tree
    args:
      slug: reactjs/react.dev
      branch: main
      file_extensions: [.md, .mdx]
      include_paths: [src/content/]
      max_files: 800
    schedule: { every: 30d }

  # ── kubernetes.io docs (concepts/tasks/reference) ─────────────────
  - name: devops-k8s-website-v2
    connector: github_tree
    args:
      slug: kubernetes/website
      branch: main
      file_extensions: [.md]
      include_paths:
        - content/en/docs/concepts/
        - content/en/docs/tasks/
        - content/en/docs/reference/
        - content/en/docs/setup/
      max_files: 2500
    schedule: { every: 30d }

  # ── PyTorch tutorials + docs ──────────────────────────────────────
  - name: ml-pytorch-tutorials-v2
    connector: github_tree
    args:
      slug: pytorch/tutorials
      branch: main
      file_extensions: [.md, .rst]
      max_files: 800
    schedule: { every: 60d }

  # ── HuggingFace transformers docs ─────────────────────────────────
  - name: ml-huggingface-transformers-v2
    connector: github_tree
    args:
      slug: huggingface/transformers
      branch: main
      file_extensions: [.md]
      include_paths: [docs/source/en/]
      max_files: 800
    schedule: { every: 60d }

  # ── Pydantic docs (since docs.pydantic.dev redirects) ─────────────
  - name: developer-pydantic-docs-v2
    connector: github_tree
    args:
      slug: pydantic/pydantic
      branch: main
      file_extensions: [.md]
      include_paths: [docs/]
      max_files: 300
    schedule: { every: 30d }

  # ── PyTorch core docs (`pytorch/pytorch/docs/source`) ─────────────
  - name: ml-pytorch-core-docs
    connector: github_tree
    args:
      slug: pytorch/pytorch
      branch: main
      file_extensions: [.rst, .md]
      include_paths: [docs/source/]
      max_files: 800
    schedule: { every: 60d }

  # ── Mobile (Android/Swift samples, lower volume) ──────────────────
  - name: mobile-android-samples-v2
    connector: github_tree
    args:
      slug: android/architecture-samples
      branch: main
      file_extensions: [.md]
      max_files: 200
    schedule: { every: 60d }
  - name: mobile-compose-samples-v2
    connector: github_tree
    args:
      slug: android/compose-samples
      branch: main
      file_extensions: [.md]
      max_files: 200
    schedule: { every: 60d }

  # ── Argo / external-secrets (their docs sites are GH md) ──────────
  - name: devops-argo-rollouts-v2
    connector: github_tree
    args:
      slug: argoproj/argo-rollouts
      branch: master
      file_extensions: [.md]
      include_paths: [docs/]
      max_files: 300
    schedule: { every: 60d }
  - name: devops-external-secrets-v2
    connector: github_tree
    args:
      slug: external-secrets/external-secrets
      branch: main
      file_extensions: [.md]
      include_paths: [docs/]
      max_files: 300
    schedule: { every: 60d }
