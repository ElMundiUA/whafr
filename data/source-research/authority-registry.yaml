# Authority registry — recognised practitioner sources per role.
#
# Single source of truth for Tier 3 (methodology / practice) picks
# in role recipes. A name qualifies if at least one of:
#  - published a recognised book in the domain
#  - cited as canonical in two+ state-of-X or handbook references
#  - maintains a 5+ year high-quality blog cited by peers
#
# Format intentionally flat — recipes pull URL lists by role name.

