# Phase 8 — sources from wave-8 audit (embedded/IoT, privacy/data
# governance, storage engines / DB internals).
sources:

  # ── Embedded / IoT (100% gap) ─────────────────────────────────────
  - name: emb-esp-idf
    connector: sitemap
    args:
      root: https://docs.espressif.com
      max_pages: 300
      include_paths: ["/projects/esp-idf/"]
    schedule: { every: 60d }
  - name: emb-zephyr
    connector: sitemap
    args:
      root: https://docs.zephyrproject.org
      max_pages: 250
    schedule: { every: 60d }
  - name: emb-platformio
    connector: sitemap
    args:
      root: https://docs.platformio.org
      max_pages: 200
    schedule: { every: 60d }
  - name: emb-freertos
    connector: sitemap
    args:
      root: https://www.freertos.org
      max_pages: 200
      include_paths: ["/Documentation/"]
    schedule: { every: 60d }
  - name: emb-mqtt-org
    connector: web
    args:
      urls:
        - https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html
        - https://datatracker.ietf.org/doc/html/rfc7252
    schedule: { every: 365d }
  - name: emb-bluetooth
    connector: web
    args:
      urls:
        - https://www.bluetooth.com/specifications/specs/core-specification-5-4/
    schedule: { every: 365d }

  # ── Privacy / data governance (99% gap) ───────────────────────────
  - name: priv-edpb
    connector: sitemap
    args:
      root: https://edpb.europa.eu
      max_pages: 200
    schedule: { every: 90d }
  - name: priv-iapp
    connector: sitemap
    args:
      root: https://iapp.org
      max_pages: 200
      include_paths: ["/resources/"]
    schedule: { every: 30d }
  - name: priv-nist-privacy
    connector: web
    args:
      urls:
        - https://www.nist.gov/privacy-framework
        - https://csrc.nist.gov/pubs/sp/800/188/final
    schedule: { every: 180d }
  - name: priv-aws-privacy
    connector: sitemap
    args:
      root: https://docs.aws.amazon.com
      max_pages: 200
      include_paths: ["/macie/", "/whitepapers/latest/privacy-reference-architecture/"]
    schedule: { every: 60d }
  - name: priv-google-dlp
    connector: sitemap
    args:
      root: https://cloud.google.com
      max_pages: 150
      include_paths: ["/sensitive-data-protection/docs"]
    schedule: { every: 60d }

  # ── Storage engines / DB internals (99% gap) ──────────────────────
  - name: storage-rocksdb-wiki
    connector: sitemap
    args:
      root: https://github.com
      max_pages: 250
      include_paths: ["/facebook/rocksdb/wiki/"]
    schedule: { every: 60d }
  - name: storage-pg-internals
    connector: sitemap
    args:
      root: https://www.postgresql.org
      max_pages: 250
      include_paths: ["/docs/current/storage", "/docs/current/indexes-types"]
    schedule: { every: 30d }
  - name: storage-innodb
    connector: sitemap
    args:
      root: https://dev.mysql.com
      max_pages: 250
      include_paths: ["/doc/refman/8.0/en/innodb-"]
    schedule: { every: 60d }
  - name: storage-cmu-db
    connector: sitemap
    args:
      root: https://15445.courses.cs.cmu.edu
      max_pages: 100
    schedule: { every: 90d }
  - name: storage-databass-dev
    connector: sitemap
    args:
      root: https://www.databass.dev
      max_pages: 100
    schedule: { every: 90d }
  - name: storage-smalldatum
    connector: sitemap
    args:
      root: https://smalldatum.blogspot.com
      max_pages: 200
    schedule: { every: 60d }
