      max_pages: 200
    schedule:
      every: 60d

  # ── Healthcare / FHIR (100% gap) ──────────────────────────────────
  - name: fhir-r4-spec
    connector: sitemap
    args:
      root: https://hl7.org
      max_pages: 400
      include_paths: ["/fhir/R4/", "/fhir/smart-app-launch/", "/fhir/us/core/"]
    schedule:
      every: 60d
  - name: fhir-bulk-data
    connector: sitemap
    args:
      root: https://hl7.org
      max_pages: 200
      include_paths: ["/fhir/uv/bulkdata/"]
    schedule:
      every: 60d
  - name: fhir-cds-hooks
    connector: sitemap
    args:
      root: https://cds-hooks.hl7.org
      max_pages: 80
    schedule:
      every: 90d
  - name: fhir-uscdi
    connector: web
    args:
      urls:
        - https://www.healthit.gov/isa/united-states-core-data-interoperability-uscdi
        - https://www.hhs.gov/hipaa/for-professionals/security/laws-regulations/
    schedule:
      every: 180d

