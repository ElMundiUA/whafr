# Phase 11 — post-cutoff content streams (E22).
#
# These sources publish continuously, and most entries post-date the
# ~Jan 2026 training cutoff of current frontier models. Their value is
# specifically "stuff frontier models can't know from training":
# release notes, vendor announcements, CVE disclosures, language /
# framework changelogs.
#
# All sources are scheduled tighter than the canonical-doc dumps —
# weekly to monthly — so the corpus stays current.
sources:

  # ── Vendor news (RSS) ────────────────────────────────────────────
  - name: rss-aws-whats-new
    connector: rss
    args:
      feeds:
        - https://aws.amazon.com/about-aws/whats-new/recent/feed/
      max_entries: 100
      fetch_body_when_missing: false  # feed already carries summary
    schedule: { every: 1d }
  - name: rss-kubernetes-blog
    connector: rss
    args:
      feeds:
        - https://kubernetes.io/feed.xml
      max_entries: 50
      fetch_body_when_missing: true
    schedule: { every: 7d }
  - name: rss-rust-blog
    connector: rss
    args:
      feeds:
        - https://blog.rust-lang.org/feed.xml
      max_entries: 50
      fetch_body_when_missing: true
    schedule: { every: 7d }
  - name: rss-python-blog
    connector: rss
    args:
      feeds:
        - https://blog.python.org/feeds/posts/default
      max_entries: 50
      fetch_body_when_missing: true
    schedule: { every: 14d }
  - name: rss-go-blog
    connector: rss
    args:
      feeds:
        - https://go.dev/blog/feed.atom
      max_entries: 50
      fetch_body_when_missing: true
    schedule: { every: 7d }
  - name: rss-mozilla-hacks
    connector: rss
    args:
      feeds:
        - https://hacks.mozilla.org/feed/
      max_entries: 50
      fetch_body_when_missing: true
    schedule: { every: 7d }
  - name: rss-cloudflare-blog
    connector: rss
    args:
      feeds:
        - https://blog.cloudflare.com/rss/
      max_entries: 100
      fetch_body_when_missing: true
    schedule: { every: 7d }
  - name: rss-postgres-news
    connector: rss
    args:
      feeds:
        - https://www.postgresql.org/news.rss
      max_entries: 50
      fetch_body_when_missing: true
    schedule: { every: 14d }

  # ── Security advisories ───────────────────────────────────────────
  - name: rss-cve-nvd-recent
    connector: rss
    args:
      feeds:
        - https://nvd.nist.gov/feeds/xml/cve/misc/nvd-rss-analyzed.xml
      max_entries: 200
      fetch_body_when_missing: false
    schedule: { every: 1d }
  - name: rss-github-advisories
    connector: rss
    args:
      feeds:
        - https://github.com/advisories.atom
      max_entries: 200
      fetch_body_when_missing: false
    schedule: { every: 1d }

  # ── GitHub Releases for top runtimes / frameworks ─────────────────
  - name: gh-releases-kubernetes
    connector: github_releases
    args: { slug: kubernetes/kubernetes, max_releases: 30 }
    schedule: { every: 7d }
  - name: gh-releases-react
    connector: github_releases
    args: { slug: facebook/react, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-nextjs
    connector: github_releases
    args: { slug: vercel/next.js, max_releases: 30 }
    schedule: { every: 7d }
  - name: gh-releases-fastapi
    connector: github_releases
    args: { slug: fastapi/fastapi, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-pydantic
    connector: github_releases
    args: { slug: pydantic/pydantic, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-rust
    connector: github_releases
    args: { slug: rust-lang/rust, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-go
    connector: github_releases
    args: { slug: golang/go, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-pytorch
    connector: github_releases
    args: { slug: pytorch/pytorch, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-vllm
    connector: github_releases
    args: { slug: vllm-project/vllm, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-transformers
    connector: github_releases
    args: { slug: huggingface/transformers, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-argo-rollouts
    connector: github_releases
    args: { slug: argoproj/argo-rollouts, max_releases: 30 }
    schedule: { every: 30d }
  - name: gh-releases-argo-cd
    connector: github_releases
    args: { slug: argoproj/argo-cd, max_releases: 30 }
    schedule: { every: 30d }
  - name: gh-releases-anthropic-sdk-python
    connector: github_releases
    args: { slug: anthropics/anthropic-sdk-python, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-openai-python
    connector: github_releases
    args: { slug: openai/openai-python, max_releases: 30 }
    schedule: { every: 14d }
  - name: gh-releases-mcp-spec
    connector: github_releases
    args: { slug: modelcontextprotocol/specification, max_releases: 30 }
    schedule: { every: 14d }
