# Phase 2 recovery — sources surfaced by the wave-3 persona audits.
# Combined with phase-1 (already ingesting), this fills the worst
# remaining 100%-gap domains.
#
# Conservative ``max_pages`` per source so a 50-source pass still
# finishes overnight. Idempotent — Graphiti dedups across runs.
sources:

  # ── Mobile (iOS / Android / RN / Flutter) ─────────────────────────
  - name: mobile-apple-developer
    connector: sitemap
    args:
      root: https://developer.apple.com
      max_pages: 300
      include_paths: ["/documentation/"]
    schedule:
      every: 60d
  - name: mobile-android-developer
    connector: sitemap
    args:
      root: https://developer.android.com
      max_pages: 300
      include_paths: ["/develop/", "/jetpack/compose"]
    schedule:
      every: 60d
  - name: mobile-react-native
    connector: sitemap
    args:
      root: https://reactnative.dev
      max_pages: 150
    schedule:
      every: 60d
  - name: mobile-expo
    connector: sitemap
    args:
      root: https://docs.expo.dev
      max_pages: 200
    schedule:
      every: 60d
  - name: mobile-flutter
    connector: sitemap
    args:
      root: https://docs.flutter.dev
      max_pages: 200
    schedule:
      every: 60d
  - name: mobile-appstore-review
    connector: web
    args:
      urls:
        - https://developer.apple.com/app-store/review/guidelines/
        - https://developer.apple.com/app-store/user-privacy-and-data-use/
    schedule:
      every: 30d

  # ── Network & protocols ───────────────────────────────────────────
